}
/* ── Dark mode: proper CSS-variable override, images untouched ── */
body.dark-mode{
  background:#0D1117;

  --surface:#161B22;
  --text:#E2E8F0;
  --text-muted:#94A3B8;
  --text-subtle:#64748B;
  --border:#21262D;

}

body.dark-mode [data-dm-surface]{background:#161B22 !important;border-color:#21262D !important}
body.dark-mode [data-dm-bg]{background:#0D1117 !important}
/* Cards text */
body.dark-mode [data-dm-text]{color:#E2E8F0 !important}
body.dark-mode [data-dm-muted]{color:#94A3B8 !important}
/* Scrollbar in dark mode */
body.dark-mode::-webkit-scrollbar-track{background:#161B22}
body.dark-mode::-webkit-scrollbar-thumb{background:#334155}
h1,h2,h3,h4,h5{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700}
input,select,textarea{font-family:'Inter',sans-serif;transition:border-color .18s ease,box-shadow .18s ease}
button{cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;transition:all .18s ease}
a{transition:color .15s ease}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#EEF2FF}
::-webkit-scrollbar-thumb{background:#94A3B8;border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:#64748B}

/* Focus rings */
:focus-visible{outline:2px solid #2563EB;outline-offset:2px;border-radius:6px}
button:focus-visible{outline:2px solid #2563EB;outline-offset:2px}
input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid #2563EB;outline-offset:0}

html{scroll-behavior:smooth}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;scroll-behavior:auto !important}
}

body{overscroll-behavior-y:contain}

@media(max-width:768px){
  #root{overflow-x:hidden}
  input,select,textarea{font-size:16px !important}
  button{min-height:44px}
}

/* Gradient text utility */
.grad-text{background:linear-gradient(135deg,#0C1F4A 0%,#2563EB 50%,#0EA5E9 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Glassmorphism card */
.glass{background:rgba(255,255,255,0.72);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.55)}

/* Animated gradient border */
@keyframes gradBorder{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

/* Pulse dot for live badge */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse-dot{animation:pulse 2s ease-in-out infinite}

/* Floating animation for hero elements */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

// ─── BADGE ────────────────────────────────────────────────────────
const statusColors = {
  DRAFT:     { bg: C.grayBg,   color: C.gray },
  SUBMITTED: { bg: C.blueLight, color: C.blue },
  VERIFIED:  { bg: C.orangeBg, color: C.orange },
  ACCEPTED:  { bg: C.greenBg,  color: C.green },
  REJECTED:  { bg: C.redBg,    color: C.red },
};
function Badge({ status }) {
  const s = statusColors[status] || statusColors.DRAFT;
  const label = tG('badge' + status.charAt(0).toUpperCase() + status.slice(1).toLowerCase());
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:5,
      padding:'4px 12px', borderRadius:100,
      background: s.bg, color: s.color, fontSize:11, fontWeight:700,
      letterSpacing:'0.04em', border:`1px solid ${s.color}33`,
      fontFamily:'Plus Jakarta Sans,sans-serif'
    }}>
      <span style={{width:5,height:5,borderRadius:'50%',background:s.color,flexShrink:0}}/>
      {label}
    </span>
  );
}

// ─── NAVBAR ───────────────────────────────────────────────────────
function Navbar({ screen, setScreen, user, setUser, lang, setLang, darkMode, setDarkMode, t }) {
  const isAuth = !!user;
  const isAdmin = user?.role === 'admin';
  const tFn = t || (k => k);
  const [menuOpen, setMenuOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const isMobile = useWindowWidth() <= 768;

  useEffect(() => {
    const handler = () => setScrolled(window.scrollY > 16);
    window.addEventListener('scroll', handler, {passive:true});
    return () => window.removeEventListener('scroll', handler);
  }, []);

  const scrollTo = (id) => {
    setMenuOpen(false);
    if (screen !== 'landing') { setScreen('landing'); setTimeout(() => { const el = document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth', block:'start'}); }, 150); }
    else { const el = document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth', block:'start'}); }
  };

  const publicNav = [
    { label: tFn('beranda'), action: () => { setScreen('landing'); setMenuOpen(false); window.scrollTo({top:0, behavior:'smooth'}); } },
    { label: tFn('profil'), action: () => scrollTo('section-profil') },
    { label: tFn('infoGPPDB'), action: () => { setScreen('ppdb-info'); setMenuOpen(false); } },
    { label: tFn('berita'), action: () => scrollTo('section-berita') },
    { label: tFn('kegiatan'), action: () => scrollTo('section-kegiatan') },
    { label: tFn('kontak'), action: () => scrollTo('section-kontak') },
  ];

  const LangDarkControls = () => (
    <div style={{display:'flex', alignItems:'center', gap:6}}>
      <div style={{display:'flex', alignItems:'center', background:'rgba(255,255,255,0.1)', borderRadius:8, border:'1px solid rgba(255,255,255,0.18)', overflow:'hidden'}}>
        {['id','en'].map(l => (
          <button key={l} onClick={() => setLang && setLang(l)} style={{
            background: lang===l ? 'rgba(255,255,255,0.22)' : 'transparent',
            border:'none', color: lang===l ? '#fff' : 'rgba(255,255,255,0.5)',
            padding:'5px 11px', fontSize:11, fontWeight: lang===l ? 700 : 400,
            cursor:'pointer', textTransform:'uppercase', letterSpacing:'0.06em',
            transition:'all .15s'
          }}>{l}</button>
        ))}
      </div>
      <button onClick={() => setDarkMode && setDarkMode(d => !d)}
        title={darkMode ? 'Light Mode' : 'Dark Mode'}
        aria-label={darkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'}
        style={{
          width:34, height:34, borderRadius:8,
          border:'1px solid rgba(255,255,255,0.18)',
          background: 'rgba(255,255,255,0.1)',
          cursor:'pointer', fontSize:15,
          display:'flex', alignItems:'center', justifyContent:'center'
        }}>
        {darkMode ? '☀️' : '🌙'}
      </button>

  );

  const navBg = scrolled
    ? 'rgba(7,15,36,0.88)'
    : 'rgba(7,15,36,0.72)';

  return (
    <div style={{position:'sticky', top:0, zIndex:100}}>
      <nav style={{
        background: navBg,
        backdropFilter: 'blur(20px)',
        WebkitBackdropFilter: 'blur(20px)',
        height:66,
        display:'flex', alignItems:'center',
        padding: isMobile ? '0 16px' : '0 40px',
        borderBottom: scrolled ? '1px solid rgba(255,255,255,0.08)' : '1px solid rgba(255,255,255,0.06)',
        boxShadow: scrolled ? '0 4px 32px rgba(0,0,0,0.32)' : 'none',
        transition: 'background .25s, box-shadow .25s'
      }}>
        {/* LOGO */}
        <div style={{display:'flex', alignItems:'center', gap:10, cursor:'pointer', flexShrink:0}}
          onClick={() => { setScreen('landing'); setMenuOpen(false); window.scrollTo({top:0,behavior:'smooth'}); }}>
          <div style={{
            width:38, height:38, borderRadius:10,
            background:'linear-gradient(135deg,#2563EB,#0EA5E9)',
            display:'flex', alignItems:'center', justifyContent:'center',
            boxShadow:'0 2px 8px rgba(37,99,235,0.5)', flexShrink:0, overflow:'hidden'

            <img src="./assets/logo.png" alt="Darul Furqan" style={{height:30, width:30, objectFit:'contain'}}/>
          </div>
          <div>
            <div style={{color:'#fff', fontSize:13, fontWeight:700, lineHeight:1.2, fontFamily:'Plus Jakarta Sans,sans-serif'}}>Darul Furqan</div>
            <div style={{color:'rgba(255,255,255,0.5)', fontSize:10, lineHeight:1.2}}>Pariaman</div>
          </div>
        </div>

        {/* DESKTOP NAV */}
        {!isMobile && !isAuth && (
          <div style={{display:'flex', flex:1, alignItems:'center'}}>
            <div style={{display:'flex', gap:1, marginLeft:28}}>
              {publicNav.map(n => (
                <button key={n.label} onClick={n.action} style={{
                  background:'none', border:'none', color:'rgba(255,255,255,0.72)',
                  fontSize:13, padding:'6px 13px', borderRadius:8, cursor:'pointer',

// ─── IMAGE PLACEHOLDER ────────────────────────────────────────────
function ImgPlaceholder({ label, width='100%', height=200, bg='#C7D2E0', stripe='#B8C5D4' }) {
  return (
    <div style={{
      width, height, background: bg, position:'relative', overflow:'hidden',
      display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0
    }}>
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%'}} xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id={`stripe-${label.replace(/\s/g,'')}`} patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(45)">
            <rect width="10" height="20" fill={stripe}/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill={`url(#stripe-${label.replace(/\s/g,'')})`} opacity="0.4"/>
      </svg>
      <div style={{
        position:'relative', textAlign:'center', padding:'8px 16px',
        background:'rgba(255,255,255,0.55)', borderRadius:6,
        fontFamily:'monospace', fontSize:11, color:'#374151', lineHeight:1.5
      }}>{label}</div>
    </div>
  );
}

// ─── STUDENT DASHBOARD ─────────────────────────────────────────────
function Dashboard({ setScreen, appStatus, setAppStatus, t }) {
  const tFn = t || tG;
  const isMobile = useWindowWidth() <= 768;

  // Popup states
  const [refreshPopup, setRefreshPopup] = useState(null); // null | 'loading' | 'done-verified' | 'done-accepted'
  const [showCongrats, setShowCongrats] = useState(false);
  const [progress, setProgress] = useState(0);

  // Auto-trigger refresh popup after 3.5s when SUBMITTED or VERIFIED
  useEffect(() => {
    if (appStatus !== 'SUBMITTED' && appStatus !== 'VERIFIED') return;
    const delay = setTimeout(() => {
      setRefreshPopup('loading');
      setProgress(0);
    }, 3500);
    return () => clearTimeout(delay);
  }, [appStatus]);

  // Animate progress bar then flip status
  useEffect(() => {
    if (refreshPopup !== 'loading') return;
    setProgress(0);
    const ticks = [
      setTimeout(() => setProgress(30),  200),
      setTimeout(() => setProgress(60),  700),
      setTimeout(() => setProgress(85),  1300),
      setTimeout(() => setProgress(100), 1900),
      setTimeout(() => {
        if (appStatus === 'SUBMITTED') {
          setAppStatus('VERIFIED');
          setRefreshPopup('done-verified');
        } else if (appStatus === 'VERIFIED') {
          setAppStatus('ACCEPTED');
          setRefreshPopup('done-accepted');
        }
      }, 2200),
    ];
    return () => ticks.forEach(clearTimeout);
  }, [refreshPopup]);

  // After "done-accepted" popup auto-closes, show congrats
  useEffect(() => {
    if (refreshPopup !== 'done-accepted') return;
    const t = setTimeout(() => {
      setRefreshPopup(null);

        </div>

        {/* NOTIFICATIONS */}
        <div style={{background:C.white, borderRadius:12, padding:'24px 28px', border:`1px solid ${C.border}`}}>

      {/* DEMO CONTROLS */}
      <div style={{marginTop:20, background:C.grayBg, borderRadius:8, padding:'16px 20px', border:`1px dashed ${C.borderDark}`}}>
        <div style={{fontSize:12, fontWeight:600, color:C.muted, marginBottom:8}}>{tFn('dashDemo')}</div>
        <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
          {['DRAFT','SUBMITTED','VERIFIED','ACCEPTED','REJECTED'].map(s => (
            <button key={s} onClick={() => { setAppStatus(s); setRefreshPopup(null); setShowCongrats(false); }} style={{
              padding:'5px 12px', fontSize:11, borderRadius:5, cursor:'pointer',

              color: appStatus===s ? '#fff' : C.text,
              border: `1px solid ${C.border}`
            }}>{s}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── PPDB FORM ─────────────────────────────────────────────────────
function PPDBForm({ setScreen, setAppStatus, t }) {
  const tFn = t || tG;
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({
    nama:'', nik:'', tempatLahir:'', tglLahir:'', jenisKelamin:'', agama:'', alamat:'',
    namaAyah:'', namaIbu:'', pekerjaan:'', telp:'',
    asalSekolah:'', nilaiUN:'', prestasi:''
  });
  const set = k => v => setForm(f=>({...f,[k]:v}));

  const steps = [tFn('formStep1'), tFn('formStep2'), tFn('formStep3')];

  const renderStep = () => {
    if (step === 0) return (
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 20px'}}>
        <div style={{gridColumn:'1/-1'}}><Field label={tFn('formNama')} value={form.nama} onChange={set('nama')} placeholder={tFn('formNamaP')}/></div>

        <Field label={tFn('formTempat')} value={form.tempatLahir} onChange={set('tempatLahir')} placeholder={tFn('formTempatP')}/>
        <Field label={tFn('formTglLahir')} type="date" value={form.tglLahir} onChange={set('tglLahir')}/>
        <div>
          <label style={{display:'block', fontSize:13, fontWeight:500, marginBottom:6}}>{tFn('formGender')}</label>
          <select value={form.jenisKelamin} onChange={e=>set('jenisKelamin')(e.target.value)} style={{
            width:'100%', padding:'10px 12px', borderRadius:7, border:`1px solid ${C.borderDark}`, fontSize:13
          }}>
            <option value="">{tFn('formGenderOpt1')}</option>
            <option>{tFn('formGenderOpt2')}</option>
            <option>{tFn('formGenderOpt3')}</option>
          </select>
        </div>
        <div>
          <label style={{display:'block', fontSize:13, fontWeight:500, marginBottom:6}}>{tFn('formAgama')}</label>
          <select value={form.agama} onChange={e=>set('agama')(e.target.value)} style={{
            width:'100%', padding:'10px 12px', borderRadius:7, border:`1px solid ${C.borderDark}`, fontSize:13
          }}>
            <option value="">{tFn('formAgamaOpt')}</option>
            <option>Islam</option><option>Kristen</option><option>Katolik</option>
            <option>Hindu</option><option>Buddha</option>
          </select>
        </div>
        <div style={{gridColumn:'1/-1'}}>
          <label style={{display:'block', fontSize:13, fontWeight:500, marginBottom:6}}>{tFn('formAlamat')}</label>
          <textarea value={form.alamat} onChange={e=>set('alamat')(e.target.value)} rows={3}

            style={{width:'100%', padding:'10px 12px', borderRadius:7, border:`1px solid ${C.borderDark}`, fontSize:13, resize:'vertical'}}/>
        </div>
      </div>
    );
    if (step === 1) return (
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 20px'}}>
        <Field label={tFn('formAyah')} value={form.namaAyah} onChange={set('namaAyah')} placeholder={tFn('formAyahP')}/>
        <Field label={tFn('formIbu')} value={form.namaIbu} onChange={set('namaIbu')} placeholder={tFn('formIbuP')}/>
        <div>
          <label style={{display:'block', fontSize:13, fontWeight:500, marginBottom:6}}>{tFn('formPekerjaan')}</label>
          <select value={form.pekerjaan} onChange={e=>set('pekerjaan')(e.target.value)} style={{
            width:'100%', padding:'10px 12px', borderRadius:7, border:`1px solid ${C.borderDark}`, fontSize:13
          }}>
            <option value="">{tFn('formPekerjaanOpt')}</option>
            <option>PNS/ASN</option><option>Wiraswasta</option><option>Karyawan Swasta</option>
            <option>Petani</option><option>Nelayan</option><option>TNI/Polri</option><option>Lainnya</option>
          </select>
        </div>
        <Field label={tFn('formTelp')} value={form.telp} onChange={set('telp')} placeholder={tFn('formTelpP')} inputMode="tel"/>

        <div style={{gridColumn:'1/-1'}}><Field label={tFn('formAsalSekolah')} value={form.asalSekolah} onChange={set('asalSekolah')} placeholder={tFn('formAsalP')}/></div>

          <textarea value={form.prestasi} onChange={e=>set('prestasi')(e.target.value)} rows={3}

            style={{width:'100%', padding:'10px 12px', borderRadius:7, border:`1px solid ${C.borderDark}`, fontSize:13, resize:'vertical'}}/>

function Upload({ setScreen, t }) {
  const tFn = t || tG;

    { key:'prestasi', label:tFn('uploadSertif'), desc:tFn('uploadSertifdesc'), req:false },
  ];
  const [uploaded, setUploaded] = useState({});
  const toggle = key => setUploaded(u => u[key] ? (({[key]:_,...r})=>r)(u) : {...u, [key]:'uploaded'});
  const required = docs.filter(d=>d.req);
  const reqDone = required.every(d => uploaded[d.key]);

  return (
    <div style={{maxWidth:780, margin:'0 auto', padding:'40px'}}>
      <div style={{marginBottom:24, display:'flex', alignItems:'center', gap:12}}>
        <button onClick={() => setScreen('form')} style={{background:'none', border:'none', color:C.muted, fontSize:13, cursor:'pointer'}}>{tFn('uploadBack')}</button>

      <div style={{background:C.white, borderRadius:12, border:`1px solid ${C.border}`, overflow:'hidden'}}>
        <div style={{padding:'20px 28px', borderBottom:`1px solid ${C.border}`, background:C.bg}}>
          <div style={{fontSize:13, color:C.muted}}>
            {Object.keys(uploaded).length} {tFn('uploadOf')} {docs.length} {tFn('uploadDocs')} ·{' '}
            <span style={{color: reqDone ? C.green : C.orange}}>
              {reqDone ? tFn('uploadAllDone') : `${required.filter(d=>!uploaded[d.key]).length} ${tFn('uploadMissing')}`}
            </span>
          </div>
        </div>
        {docs.map((d,i) => (
          <div key={d.key} style={{
            padding:'18px 28px', borderBottom: i<docs.length-1 ? `1px solid ${C.border}` : 'none',
            display:'flex', alignItems:'center', justifyContent:'space-between',
            background: uploaded[d.key] ? C.greenBg : 'transparent'
          }}>
            <div style={{flex:1}}>
              <div style={{display:'flex', alignItems:'center', gap:8}}>
                <span style={{fontSize:13, fontWeight:600, color:C.text}}>{d.label}</span>
                {d.req && <span style={{fontSize:10, background:C.redBg, color:C.red, padding:'1px 6px', borderRadius:4, fontWeight:600}}>{tFn('uploadRequired')}</span>}
                {uploaded[d.key] && <span style={{fontSize:11, color:C.green, fontWeight:600}}>{tFn('uploadDone')}</span>}
              </div>
              <div style={{fontSize:12, color:C.muted, marginTop:2}}>{d.desc}</div>
              {uploaded[d.key] && <div style={{fontSize:11, color:C.muted, marginTop:2}}>dokumen_{d.key}.pdf · 1.2 MB</div>}
            </div>
            <button onClick={() => toggle(d.key)} style={{
              background: uploaded[d.key] ? C.redBg : C.navy,
              border: uploaded[d.key] ? `1px solid ${C.red}33` : 'none',
              color: uploaded[d.key] ? C.red : '#fff',
              padding:'8px 16px', borderRadius:6, fontSize:12, fontWeight:500
            }}>
              {uploaded[d.key] ? tFn('uploadDelete') : tFn('uploadAdd')}
            </button>
          </div>
        ))}
      </div>
      <div style={{display:'flex', justifyContent:'flex-end', marginTop:20, gap:12}}>
        <button onClick={() => setScreen('dashboard')} style={{
          background:'none', border:`1px solid ${C.border}`, color:C.text,

          <tbody>
            {filtered.map((a,i) => (
              <tr key={a.id} style={{borderBottom:`1px solid ${C.border}`, background: i%2===0 ? '#fff' : C.bg+'50'}}>
                <td style={{padding:'12px 16px', color:C.muted}}>{i+1}</td>
                <td style={{padding:'12px 16px'}}>
                  <div style={{display:'flex', alignItems:'center', gap:10}}>
                    <div style={{width:30, height:30, borderRadius:'50%', background:C.navy, color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700}}>{a.name[0]}</div>
                    <div>
                      <div style={{fontWeight:500, color:C.text}}>{a.name}</div>
                      <div style={{fontSize:11, color:C.muted}}>PPDB-2026-00{a.id}</div>
                    </div>
                  </div>
                </td>
                <td style={{padding:'12px 16px', color:C.muted}}>{a.school}</td>
                <td style={{padding:'12px 16px', color:C.muted}}>{a.date}</td>
                <td style={{padding:'12px 16px', fontWeight:600, color: a.score>=80 ? C.green : a.score>=70 ? C.orange : a.score ? C.red : C.muted}}>
                  {a.score || '—'}
                </td>
                <td style={{padding:'12px 16px'}}><Badge status={a.status}/></td>
                <td style={{padding:'12px 16px'}}>
                  <div style={{display:'flex', gap:6}}>
                    {a.status === 'SUBMITTED' && (
                      <button onClick={() => setVerifyModal(a)} style={{
                        background:C.blue, border:'none', color:'#fff',
                        padding:'5px 12px', borderRadius:5, fontSize:11, fontWeight:500
                      }}>{tFn('adminVerifyBtn')}</button>
                    )}
                    {a.status === 'VERIFIED' && (
                      <>
                        <button onClick={() => doVerify(a.id,'accept')} style={{
                          background:C.green, border:'none', color:'#fff',
                          padding:'5px 10px', borderRadius:5, fontSize:11
                        }}>{tFn('adminAcceptBtn')}</button>
                        <button onClick={() => doVerify(a.id,'reject')} style={{
                          background:C.redBg, border:`1px solid ${C.red}33`, color:C.red,
                          padding:'5px 10px', borderRadius:5, fontSize:11
                        }}>{tFn('adminRejectBtn')}</button>
                      </>
                    )}
                    {['ACCEPTED','REJECTED','DRAFT'].includes(a.status) && (
                      <button style={{
                        background:C.bg, border:`1px solid ${C.border}`, color:C.muted,
                        padding:'5px 12px', borderRadius:5, fontSize:11
                      }}>{tFn('adminDetailBtn')}</button>
                    )}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* VERIFY MODAL */}
      {verifyModal && (
        <div style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,0.4)',
          display:'flex', alignItems:'center', justifyContent:'center', zIndex:200
        }}>
          <div style={{
            background:C.white, borderRadius:14, padding:'36px 40px',
            maxWidth:520, width:'90%', boxShadow:'0 20px 60px rgba(0,0,0,0.2)'
          }}>
            <h2 style={{fontSize:18, color:C.navy, marginBottom:6}}>{tFn('adminModalTitle')}</h2>
            <p style={{fontSize:13, color:C.muted, marginBottom:20}}>{tFn('adminModalSub')} <strong style={{color:C.text}}>{verifyModal.name}</strong></p>
            <div style={{background:C.bg, borderRadius:8, padding:'16px', marginBottom:20}}>
              {[
                [tFn('adminModalDoc1'), tFn('adminModalComplete')],
                [tFn('adminModalDoc2'), tFn('adminModalComplete')],
                [tFn('adminModalDoc3'), tFn('adminModalComplete')],
                [tFn('adminModalDoc4'), tFn('adminModalComplete')],
                [tFn('adminModalDoc5'), tFn('adminModalMissing')],
              ].map(([k,v]) => (
                <div key={k} style={{display:'flex', justifyContent:'space-between', padding:'6px 0', borderBottom:`1px solid ${C.border}`, fontSize:13}}>
                  <span style={{color:C.muted}}>{k}</span>
                  <span style={{color: v.includes('✓') ? C.green : C.orange, fontWeight:500}}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{marginBottom:16}}>
              <label style={{display:'block', fontSize:13, fontWeight:500, marginBottom:6}}>{tFn('adminModalNoteLabel')}</label>
              <textarea rows={3} placeholder={tFn('adminModalNoteP')}
                style={{width:'100%', padding:'10px 12px', borderRadius:7, border:`1px solid ${C.borderDark}`, fontSize:13, resize:'none'}}/>
            </div>
            <div style={{display:'flex', gap:10, justifyContent:'flex-end'}}>
              <button onClick={() => setVerifyModal(null)} style={{
                background:'none', border:`1px solid ${C.border}`, color:C.text,
                padding:'10px 20px', borderRadius:7, fontSize:13
              }}>{tFn('adminModalCancel')}</button>
              <button onClick={() => doVerify(verifyModal.id,'reject')} style={{
                background:C.redBg, border:`1px solid ${C.red}44`, color:C.red,
                padding:'10px 20px', borderRadius:7, fontSize:13, fontWeight:500
              }}>{tFn('adminModalRejectBtn')}</button>
              <button onClick={() => doVerify(verifyModal.id,'verify')} style={{
                background:C.navy, border:'none', color:'#fff',
                padding:'10px 20px', borderRadius:7, fontSize:13, fontWeight:600
              }}>{tFn('adminModalVerifyBtn')}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── APP ROOT ──────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('landing');
  const [user, setUser] = useState(null);
  const [appStatus, setAppStatus] = useState('DRAFT');
  const [lang, setLang] = useState('id');
  const [darkMode, setDarkMode] = useState(false);
  const isMobile = useWindowWidth() <= 768;

  _lang = lang;

  useEffect(() => {
    document.body.classList.toggle('dark-mode', darkMode);
  }, [darkMode]);

  // Override design tokens for dark mode — images are never touched
  if (darkMode) {
    C.bg        = '#0D1117';
    C.white     = '#161B22';
    C.text      = '#E2E8F0';
    C.muted     = '#94A3B8';
    C.subtle    = '#64748B';
    C.border    = '#21262D';
    C.borderDark= '#30363D';
    C.grayBg    = '#1C2128';
    C.blueLight = '#0D1F3C';
    C.greenBg   = '#0D2620';
    C.redBg     = '#2D1515';
    C.orangeBg  = '#2D1F06';
  } else {
    C.bg        = '#F0F4FF';
    C.white     = '#FFFFFF';
    C.text      = '#0F172A';
    C.muted     = '#475569';
    C.subtle    = '#94A3B8';
    C.border    = '#CBD5E1';
    C.borderDark= '#94A3B8';
    C.grayBg    = '#F1F5F9';
    C.blueLight = '#EFF6FF';
    C.greenBg   = '#ECFDF5';
    C.redBg     = '#FEF2F2';
    C.orangeBg  = '#FFFBEB';
  }

  const t = tG;

  const screens = {
    landing: <Landing setScreen={setScreen} lang={lang} t={t}/>,
    'ppdb-info': <PPDBInfo setScreen={setScreen} t={t}/>,
    register: <Register setScreen={setScreen} t={t}/>,
    'verify-email': <VerifyEmail setScreen={setScreen} t={t}/>,
    login: <Login setScreen={setScreen} setUser={setUser} t={t}/>,
    dashboard: <Dashboard setScreen={setScreen} appStatus={appStatus} setAppStatus={setAppStatus} t={t}/>,
    form: <PPDBForm setScreen={setScreen} setAppStatus={setAppStatus} t={t}/>,
    upload: <Upload setScreen={setScreen} t={t}/>,
    'submit-confirm': <SubmitConfirm setScreen={setScreen} setAppStatus={setAppStatus} t={t}/>,
    result: <Result setScreen={setScreen} appStatus={appStatus} t={t}/>,
    'admin-dashboard': <AdminDashboard setScreen={setScreen} t={t}/>,
    'admin-list': <AdminList setScreen={setScreen} t={t}/>,
  };

  return (
    <div style={{minHeight:'100vh', background:C.bg}}>
      <Navbar screen={screen} setScreen={setScreen} user={user} setUser={setUser}
        lang={lang} setLang={setLang} darkMode={darkMode} setDarkMode={setDarkMode} t={t}/>
      <div style={{minHeight:'calc(100vh - 66px)'}}>
        {screens[screen] || screens.landing}
      </div>
      <footer style={{background:C.navyDark, borderTop:'1px solid rgba(255,255,255,0.06)'}}>
        {/* Top gradient stripe */}
        <div style={{height:3, background:'linear-gradient(90deg,#2563EB,#0EA5E9,#7C3AED)'}}/>
        <div style={{maxWidth:1200, margin:'0 auto', padding: isMobile ? '44px 20px 28px' : '56px 60px 36px'}}>
          <div style={{display:'grid', gridTemplateColumns: isMobile ? '1fr 1fr' : '2.2fr 1fr 1fr 1fr', gap: isMobile ? 28 : 48, marginBottom:36}}>
            {/* Brand */}
            <div style={{gridColumn: isMobile ? '1 / -1' : 'auto'}}>
              <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:18}}>
                <div style={{width:44,height:44,borderRadius:12,background:'linear-gradient(135deg,#2563EB,#0EA5E9)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 14px rgba(37,99,235,0.4)',overflow:'hidden',flexShrink:0}}>
                  <img src="./assets/logo.png" alt="Darul Furqan" style={{height:36,width:36,objectFit:'contain'}}/>
                </div>
                <div>
                  <div style={{color:'#fff', fontSize:15, fontWeight:700, fontFamily:'Plus Jakarta Sans,sans-serif'}}>Darul Furqan</div>
                  <div style={{color:'rgba(255,255,255,0.4)', fontSize:11}}>Pariaman — Sejak 1981</div>
                </div>
              </div>
              <p style={{fontSize:12.5, color:'rgba(255,255,255,0.46)', lineHeight:1.85, marginBottom:22, maxWidth:300}}>
                {t('fDesc')}
              </p>
              <div style={{display:'flex', gap:8}}>
                {[
                  { label:'FB', colors:'#1877F2' },
                  { label:'IG', colors:'#E4405F' },
                  { label:'YT', colors:'#FF0000' },
                ].map((s,i) => (
                  <div key={i} style={{
                    width:34, height:34, borderRadius:9,
                    background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.12)',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize:11, color:'rgba(255,255,255,0.5)', cursor:'pointer', fontWeight:800,
                    fontFamily:'Plus Jakarta Sans,sans-serif', transition:'all .18s'
                  }}
                    onMouseEnter={e=>{e.currentTarget.style.background=s.colors+'22';e.currentTarget.style.borderColor=s.colors+'55';e.currentTarget.style.color='#fff'}}
                    onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,0.07)';e.currentTarget.style.borderColor='rgba(255,255,255,0.12)';e.currentTarget.style.color='rgba(255,255,255,0.5)'}}
                  >{s.label}</div>
                ))}
              </div>
            </div>
            {/* Quick Links */}
            <div>
              <div style={{fontSize:11, fontWeight:700, color:'rgba(255,255,255,0.85)', letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:18, fontFamily:'Plus Jakarta Sans,sans-serif'}}>{t('fNav')}</div>
              {t('fNavLinks').map(l => (
                <div key={l} style={{fontSize:13, color:'rgba(255,255,255,0.46)', marginBottom:11, cursor:'pointer', transition:'color .15s'}}
                  onMouseEnter={e=>e.currentTarget.style.color='rgba(255,255,255,0.9)'}
                  onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.46)'}
                >{l}</div>
              ))}
            </div>
            {/* PPDB Links */}
            <div>
              <div style={{fontSize:11, fontWeight:700, color:'rgba(255,255,255,0.85)', letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:18, fontFamily:'Plus Jakarta Sans,sans-serif'}}>{t('fPPDB')}</div>
              {t('fPPDBLinks').map(l => (
                <div key={l} style={{fontSize:13, color:'rgba(255,255,255,0.46)', marginBottom:11, cursor:'pointer', transition:'color .15s'}}
                  onMouseEnter={e=>e.currentTarget.style.color='rgba(255,255,255,0.9)'}
                  onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.46)'}
                >{l}</div>
              ))}
            </div>
            {/* Contact */}
            <div>
              <div style={{fontSize:11, fontWeight:700, color:'rgba(255,255,255,0.85)', letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:18, fontFamily:'Plus Jakarta Sans,sans-serif'}}>{t('fKontak')}</div>
              {[
                { icon:'📍', text:t('fContactAddr') },
                { icon:'📞', text:t('fContactTelp') },
                { icon:'✉️', text:t('fContactEmail') },
                { icon:'🕐', text:t('fContactHours') },
              ].map((c,i) => (
                <div key={i} style={{display:'flex', gap:9, marginBottom:11, alignItems:'flex-start'}}>
                  <span style={{fontSize:13, marginTop:1}}>{c.icon}</span>
                  <span style={{fontSize:12.5, color:'rgba(255,255,255,0.46)', lineHeight:1.55}}>{c.text}</span>
                </div>
              ))}
            </div>
          </div>
          {/* Bottom bar */}
          <div style={{
            borderTop:'1px solid rgba(255,255,255,0.07)',
            paddingTop:22, display:'flex',
            flexDirection: isMobile ? 'column' : 'row',
            justifyContent:'space-between', alignItems: isMobile ? 'flex-start' : 'center',
            gap: isMobile ? 6 : 0
          }}>
            <div style={{fontSize:12, color:'rgba(255,255,255,0.28)'}}>{t('fCopy')}</div>
            <div style={{fontSize:12, color:'rgba(255,255,255,0.28)'}}>{t('fSys')}</div>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
