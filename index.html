html{scroll-behavior:smooth}

    n1t:'PPDB 2026/2027 Registration Officially Opens', n1c:'Announcement', n1d:'April 1, 2026',
    n1desc:'Yayasan Darul Furqan Pariaman officially opens New Student Admission (PPDB) for Academic Year 2026/2027 starting April 1, 2026. Registration is conducted online via ppdb.darulfurqan.sch.id. A quota of 120 new students is available across SD, SMP, and SMA levels. Prospective students can register until June 30, 2026 at no cost.',

    n2desc:'Three students from Yayasan Darul Furqan won medals at the 2026 National Science Olympiad (OSN). Ahmad Rizki (SMP) won gold in Mathematics, Siti Aisyah (SMA) won silver in Biology, and Farhan Maulana (SMA) won bronze in Physics. This achievement brings pride to Pariaman on the national stage.',
    n3t:'Entrance Exam Schedule for Document Selection Phase', n3c:'Academic', n3d:'March 15, 2026',
    n3desc:'The PPDB committee announces the document selection schedule. Document verification runs July 1–15, 2026. Students who pass will sit a written test and interview on July 17–18, 2026 at the main building. Results will be announced on July 20, 2026 via the online portal and notice board.',

    n4desc:'Yayasan Darul Furqan held the Isra Mi\'raj 1447 H commemoration with solemnity. The event featured Quran recitation, a religious lecture by Ustadz Dr. H. Zulkifli, M.Ag., inter-class Islamic speech competition, and hadroh art performances. All students, teachers, and staff actively participated in this Islamic celebration.',
    n5t:'Academic Scholarship Program Open', n5c:'Announcement', n5d:'February 10, 2026',
    n5desc:'Yayasan Darul Furqan opens a full scholarship program for high-achieving students from underprivileged families. The scholarship covers tuition, uniform, books, and monthly allowance. Applications close February 28, 2026. Key requirements include a minimum GPA of 85, a poverty certificate, and principal\'s recommendation.',
    n6t:'Study Visit to Universities in Padang', n6c:'Activity', n6d:'February 5, 2026',
    n6desc:'Grade XII SMA students visited several universities in Padang: Universitas Andalas, Universitas Negeri Padang, and Politeknik Negeri Padang. The visit aims to help students choose college majors. Students received direct presentations from lecturers and active students about study programs, campus facilities, and admission pathways.',

    ke1desc:'Learning takes place through active and interactive methods. Certified teachers guide students using scientific approaches, group discussions, and hands-on practice. Each classroom is equipped with projectors and digital whiteboards to support a modern, engaging learning experience.',

    ke3t:'Scouting Extracurricular', ke3c:'Extracurricular', ke3d:'Every Friday',
    ke3desc:'Scouting is a compulsory extracurricular for SD and SMP students. Activities include marching drills, rope skills, navigation, first aid, and camping. Students participate in the National Jamboree and Raimuna annually. Scouting builds independence, courage, discipline, and social spirit.',
    ke4t:'Student Science Olympiad', ke4c:'Academic', ke4d:'Annual',
    ke4desc:'Yayasan Darul Furqan actively enters students in various science olympiads from district to national levels. Intensive coaching is provided by expert teachers in Mathematics, Science, Social Studies, and Indonesian. Hundreds of medals have been won in the past decade, affirming the school\'s academic quality.',
    ke5t:'Tahfidz & Pesantren Activities', ke5c:'Religious', ke5d:'Daily',

    ke6t:'Graduation & Grade XII Farewell', ke6c:'Academic', ke6d:'June 2026',

// ─── BADGE ────────────────────────────────────────────────────────
const statusColors = {
  DRAFT:     { bg: C.grayBg,   color: C.gray },
  SUBMITTED: { bg: C.blueLight, color: C.blue },
  VERIFIED:  { bg: C.orangeBg, color: C.orange },
  ACCEPTED:  { bg: C.greenBg,  color: C.green },
  REJECTED:  { bg: C.redBg,    color: C.red },
};
function Badge({ status }) {
  const s = statusColors[status] || statusColors.DRAFT;
  const label = tG('badge' + status.charAt(0).toUpperCase() + status.slice(1).toLowerCase());
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:5,
      padding:'4px 12px', borderRadius:100,
      background: s.bg, color: s.color, fontSize:11, fontWeight:700,
      letterSpacing:'0.04em', border:`1px solid ${s.color}33`,
      fontFamily:'Plus Jakarta Sans,sans-serif'
    }}>
      <span style={{width:5,height:5,borderRadius:'50%',background:s.color,flexShrink:0}}/>
      {label}
    </span>
  );
}

// ─── IMAGE PLACEHOLDER ────────────────────────────────────────────
function ImgPlaceholder({ label, width='100%', height=200, bg='#C7D2E0', stripe='#B8C5D4' }) {
  return (
    <div style={{
      width, height, background: bg, position:'relative', overflow:'hidden',
      display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0
    }}>
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%'}} xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id={`stripe-${label.replace(/\s/g,'')}`} patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(45)">
            <rect width="10" height="20" fill={stripe}/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill={`url(#stripe-${label.replace(/\s/g,'')})`} opacity="0.4"/>
      </svg>
      <div style={{
        position:'relative', textAlign:'center', padding:'8px 16px',
        background:'rgba(255,255,255,0.55)', borderRadius:6,
        fontFamily:'monospace', fontSize:11, color:'#374151', lineHeight:1.5
      }}>{label}</div>
    </div>
  );
}

        {filtered.length === 0 && (
          <div style={{textAlign:'center', padding:'72px 20px', color:C.muted}}>

              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={C.subtle} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
            </div>
            <div style={{fontSize:15, fontWeight:700, color:C.text, marginBottom:6}}>Tidak ada kegiatan</div>
            <div style={{fontSize:13, color:C.muted}}>Tidak ada kegiatan di kategori ini</div>

      </div>
    </div>
  );
}

// ─── PROFILE PAGE ──────────────────────────────────────────────────
function ProfilePage({ setScreen, t }) {
  const tFn = t || tG;
  const isMobile = useWindowWidth() <= 768;
  const [tab, setTab] = useState('biodata');
  const [biodata, setBiodata] = useState({ name:'Ahmad Fauzi', email:'ahmad@gmail.com', phone:'08123456789' });
  const [biodataSaved, setBiodataSaved] = useState(false);
  const [pass, setPass] = useState({ curr:'', next:'', conf:'' });
  const [passErr, setPassErr] = useState({});
  const [passSaved, setPassSaved] = useState(false);

  const docs = [
    { key:'ktp',    label: tFn('profileDocKTP'),    uploaded: true  },
    { key:'ijazah', label: tFn('profileDocIjazah'), uploaded: false },
    { key:'foto',   label: tFn('profileDocFoto'),   uploaded: true  },
    { key:'akta',   label: tFn('profileDocAkta'),   uploaded: false },
  ];

  function saveBiodata(e) {
    e.preventDefault();
    setBiodataSaved(true);
    setTimeout(() => setBiodataSaved(false), 2200);
  }

  function savePass(e) {
    e.preventDefault();
    const errs = {};
    if (!pass.curr) errs.curr = 'Wajib diisi';
    if (!pass.next) errs.next = 'Wajib diisi';
    else if (pass.next.length < 8) errs.next = 'Minimal 8 karakter';
    if (pass.conf !== pass.next) errs.conf = 'Password tidak cocok';
    if (Object.keys(errs).length) { setPassErr(errs); return; }
    setPassErr({});
    setPassSaved(true);
    setPass({ curr:'', next:'', conf:'' });
    setTimeout(() => setPassSaved(false), 2200);
  }

  const tabs = [
    { key:'biodata',  label: tFn('profileTabBiodata'),  icon:'user' },
    { key:'password', label: tFn('profileTabPassword'), icon:'lock' },
    { key:'dokumen',  label: tFn('profileTabDokumen'),  icon:'doc'  },
  ];

  const inputStyle = (err) => ({
    width:'100%', padding:'11px 14px', borderRadius:10, fontSize:13.5, outline:'none',
    color: C.text, fontFamily:'Plus Jakarta Sans,sans-serif',
    border: err ? `1.5px solid ${C.red}` : `1.5px solid ${C.border}`,
    background: err ? C.redBg : '#FAFBFF',
    boxSizing:'border-box', transition:'border-color .18s, box-shadow .18s'
  });

  const labelStyle = (err) => ({
    display:'block', fontSize:13, fontWeight:600, marginBottom:7,
    color: err ? C.red : C.text, fontFamily:'Plus Jakarta Sans,sans-serif'
  });

  return (
    <div style={{ minHeight:'calc(100vh - 66px)', background: C.bg, paddingBottom:48 }}>
      {/* Hero header */}
      <div style={{ background: C.gradHero, padding: isMobile ? '36px 20px 28px' : '48px 0 36px' }}>
        <div style={{ maxWidth:720, margin:'0 auto', padding: isMobile ? 0 : '0 24px' }}>
          <button onClick={() => setScreen('dashboard')} style={{
            background:'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.18)',
            color:'rgba(255,255,255,0.78)', borderRadius:8, padding:'7px 16px',
            fontSize:13, cursor:'pointer', fontFamily:'Plus Jakarta Sans,sans-serif',
            fontWeight:500, marginBottom:20, display:'inline-block'
          }}>{tFn('profileBack')}</button>
          <div style={{ display:'flex', alignItems:'center', gap:18 }}>
            <div style={{
              width:60, height:60, borderRadius:'50%',
              background: C.gradBlue,
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:24, fontWeight:800, color:'#fff',
              fontFamily:'Plus Jakarta Sans,sans-serif', flexShrink:0,
              boxShadow:'0 4px 16px rgba(37,99,235,0.45)'
            }}>{biodata.name[0]}</div>
            <div>
              <div style={{ fontSize: isMobile ? 20 : 24, fontWeight:800, color:'#fff', fontFamily:'Plus Jakarta Sans,sans-serif' }}>{biodata.name}</div>
              <div style={{ fontSize:13, color:'rgba(255,255,255,0.6)', fontFamily:'Plus Jakarta Sans,sans-serif', marginTop:2 }}>{biodata.email}</div>
            </div>
          </div>
        </div>
      </div>

      <div style={{ maxWidth:720, margin:'0 auto', padding: isMobile ? '0 16px' : '0 24px' }}>
        {/* Tabs */}
        <div style={{
          display:'flex', gap:4, marginTop: isMobile ? 20 : 28, marginBottom:24,
          background: C.white, borderRadius:12, padding:4,
          border:`1px solid ${C.border}`, boxShadow:'0 1px 6px rgba(12,31,74,0.06)'
        }}>
          {tabs.map(tb => (
            <button key={tb.key} onClick={() => setTab(tb.key)} style={{
              flex:1, display:'flex', alignItems:'center', justifyContent:'center', gap:6,
              padding: isMobile ? '10px 6px' : '11px 12px',
              background: tab === tb.key ? C.gradBlue : 'transparent',
              border:'none', borderRadius:9, cursor:'pointer',
              color: tab === tb.key ? '#fff' : C.muted,
              fontSize: isMobile ? 12 : 13, fontWeight:600,
              fontFamily:'Plus Jakarta Sans,sans-serif',
              transition:'background .18s, color .18s'
            }}>
              <Icon name={tb.icon} size={15} color={tab === tb.key ? '#fff' : C.muted}/>
              {!isMobile && tb.label}
              {isMobile && tb.label.split(' ')[0]}
            </button>
          ))}
        </div>

        {/* BIODATA TAB */}
        {tab === 'biodata' && (
          <div style={{ background: C.white, borderRadius:14, padding: isMobile ? '24px 20px' : '32px 36px', border:`1px solid ${C.border}`, boxShadow:'0 2px 12px rgba(12,31,74,0.07)' }}>
            <div style={{ fontSize:16, fontWeight:700, color: C.text, marginBottom:24, fontFamily:'Plus Jakarta Sans,sans-serif' }}>{tFn('profileTabBiodata')}</div>
            <form onSubmit={saveBiodata}>
              <div style={{ marginBottom:18 }}>
                <label style={labelStyle(false)}>{tFn('profileName')}</label>
                <input value={biodata.name} onChange={e => setBiodata(b=>({...b, name:e.target.value}))}
                  style={inputStyle(false)}
                  onFocus={e=>{e.target.style.borderColor=C.blue; e.target.style.boxShadow=`0 0 0 3px ${C.blue}1A`; e.target.style.background='#fff'}}
                  onBlur={e=>{e.target.style.borderColor=C.border; e.target.style.boxShadow='none'; e.target.style.background='#FAFBFF'}}
                />
              </div>
              <div style={{ marginBottom:18 }}>
                <label style={labelStyle(false)}>{tFn('profileEmail')}</label>
                <input type="email" value={biodata.email} onChange={e => setBiodata(b=>({...b, email:e.target.value}))}
                  style={inputStyle(false)}
                  onFocus={e=>{e.target.style.borderColor=C.blue; e.target.style.boxShadow=`0 0 0 3px ${C.blue}1A`; e.target.style.background='#fff'}}
                  onBlur={e=>{e.target.style.borderColor=C.border; e.target.style.boxShadow='none'; e.target.style.background='#FAFBFF'}}
                />
              </div>
              <div style={{ marginBottom:28 }}>
                <label style={labelStyle(false)}>{tFn('profilePhone')}</label>
                <input type="tel" value={biodata.phone} onChange={e => setBiodata(b=>({...b, phone:e.target.value}))}
                  style={inputStyle(false)}
                  onFocus={e=>{e.target.style.borderColor=C.blue; e.target.style.boxShadow=`0 0 0 3px ${C.blue}1A`; e.target.style.background='#fff'}}
                  onBlur={e=>{e.target.style.borderColor=C.border; e.target.style.boxShadow='none'; e.target.style.background='#FAFBFF'}}
                />
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:14 }}>
                <button type="submit" style={{
                  background: C.gradBlue, border:'none', color:'#fff',
                  borderRadius:10, padding:'12px 28px', fontSize:14, fontWeight:700,
                  cursor:'pointer', fontFamily:'Plus Jakarta Sans,sans-serif',
                  boxShadow:'0 4px 14px rgba(37,99,235,0.35)', transition:'opacity .18s'
                }}
                  onMouseEnter={e=>e.currentTarget.style.opacity='0.88'}
                  onMouseLeave={e=>e.currentTarget.style.opacity='1'}
                >{tFn('profileSaveBiodata')}</button>
                {biodataSaved && (
                  <span style={{ color: C.green, fontSize:13, fontWeight:600, fontFamily:'Plus Jakarta Sans,sans-serif' }}>✓ {tFn('profileSaved')}</span>
                )}
              </div>
            </form>
          </div>
        )}

        {/* PASSWORD TAB */}
        {tab === 'password' && (
          <div style={{ background: C.white, borderRadius:14, padding: isMobile ? '24px 20px' : '32px 36px', border:`1px solid ${C.border}`, boxShadow:'0 2px 12px rgba(12,31,74,0.07)' }}>
            <div style={{ fontSize:16, fontWeight:700, color: C.text, marginBottom:24, fontFamily:'Plus Jakarta Sans,sans-serif' }}>{tFn('profileTabPassword')}</div>
            <form onSubmit={savePass}>
              {[
                { key:'curr', label: tFn('profileCurrPass') },
                { key:'next', label: tFn('profileNewPass') },
                { key:'conf', label: tFn('profileConfPass') },
              ].map(f => (
                <div key={f.key} style={{ marginBottom: f.key === 'conf' ? 28 : 18 }}>
                  <label style={labelStyle(passErr[f.key])}>{f.label}</label>
                  <input type="password" value={pass[f.key]}
                    onChange={e => { setPass(p=>({...p, [f.key]:e.target.value})); setPassErr(er=>({...er, [f.key]:''})); }}
                    style={inputStyle(passErr[f.key])}
                    onFocus={e=>{if(!passErr[f.key]){e.target.style.borderColor=C.blue; e.target.style.boxShadow=`0 0 0 3px ${C.blue}1A`; e.target.style.background='#fff'}}}
                    onBlur={e=>{if(!passErr[f.key]){e.target.style.borderColor=C.border; e.target.style.boxShadow='none'; e.target.style.background='#FAFBFF'}}}
                  />
                  {passErr[f.key] && <div style={{ fontSize:12, color: C.red, marginTop:5, fontFamily:'Plus Jakarta Sans,sans-serif' }}>{passErr[f.key]}</div>}
                </div>
              ))}
              <div style={{ display:'flex', alignItems:'center', gap:14 }}>
                <button type="submit" style={{
                  background: C.gradBlue, border:'none', color:'#fff',
                  borderRadius:10, padding:'12px 28px', fontSize:14, fontWeight:700,
                  cursor:'pointer', fontFamily:'Plus Jakarta Sans,sans-serif',
                  boxShadow:'0 4px 14px rgba(37,99,235,0.35)', transition:'opacity .18s'
                }}
                  onMouseEnter={e=>e.currentTarget.style.opacity='0.88'}
                  onMouseLeave={e=>e.currentTarget.style.opacity='1'}
                >{tFn('profileSavePass')}</button>
                {passSaved && (
                  <span style={{ color: C.green, fontSize:13, fontWeight:600, fontFamily:'Plus Jakarta Sans,sans-serif' }}>✓ {tFn('profilePassSaved')}</span>
                )}
              </div>
            </form>
          </div>
        )}

        {/* DOKUMEN TAB */}
        {tab === 'dokumen' && (
          <div style={{ background: C.white, borderRadius:14, padding: isMobile ? '24px 20px' : '32px 36px', border:`1px solid ${C.border}`, boxShadow:'0 2px 12px rgba(12,31,74,0.07)' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:24, flexWrap:'wrap', gap:12 }}>
              <div style={{ fontSize:16, fontWeight:700, color: C.text, fontFamily:'Plus Jakarta Sans,sans-serif' }}>{tFn('profileDocTitle')}</div>
              <button onClick={() => setScreen('upload')} style={{
                background: C.gradBlue, border:'none', color:'#fff',
                borderRadius:10, padding:'10px 20px', fontSize:13, fontWeight:700,
                cursor:'pointer', fontFamily:'Plus Jakarta Sans,sans-serif',
                boxShadow:'0 3px 10px rgba(37,99,235,0.3)', transition:'opacity .18s'
              }}
                onMouseEnter={e=>e.currentTarget.style.opacity='0.88'}
                onMouseLeave={e=>e.currentTarget.style.opacity='1'}
              >{tFn('profileDocUpload')}</button>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {docs.map(d => (
                <div key={d.key} style={{
                  display:'flex', alignItems:'center', justifyContent:'space-between',
                  padding:'14px 18px', borderRadius:10,
                  border:`1px solid ${d.uploaded ? C.green + '55' : C.border}`,
                  background: d.uploaded ? C.greenBg : C.grayBg
                }}>
                  <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                    <Icon name="doc" size={18} color={d.uploaded ? C.green : C.muted}/>
                    <span style={{ fontSize:14, fontWeight:500, color: C.text, fontFamily:'Plus Jakarta Sans,sans-serif' }}>{d.label}</span>
                  </div>
                  <span style={{
                    fontSize:12, fontWeight:700, padding:'4px 12px', borderRadius:20,
                    background: d.uploaded ? C.greenBg : C.orangeBg,
                    color: d.uploaded ? C.green : C.orange,
                    border:`1px solid ${d.uploaded ? C.green + '44' : C.orange + '44'}`,
                    fontFamily:'Plus Jakarta Sans,sans-serif'
                  }}>
                    {d.uploaded ? tFn('profileDocUploaded') : tFn('profileDocMissing')}
                  </span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Register({ setScreen, t }) {
  const tFn = t || tG;
  const [form, setForm] = useState({ name:'', email:'', phone:'', password:'', confirm:'' });
  const [loading, setLoading] = useState(false);
  const [errors, setErrors] = useState({});
  const isValidEmail = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  const set = k => v => { setForm(f=>({...f,[k]:v})); setErrors(e=>({...e,[k]:''})); };
  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = 'Wajib diisi';
    if (!form.email.trim()) e.email = 'Wajib diisi';
    else if (!isValidEmail(form.email)) e.email = 'Format email tidak valid';
    if (!form.phone.trim()) e.phone = 'Wajib diisi';
    if (!form.password) e.password = 'Wajib diisi';
    else if (form.password.length < 8) e.password = 'Minimal 8 karakter';
    if (!form.confirm) e.confirm = 'Wajib diisi';
    else if (form.confirm !== form.password) e.confirm = 'Password tidak cocok';
    setErrors(e);
    return Object.keys(e).length === 0;
  };
  const submit = () => {
    if (!validate()) return;
    setLoading(true);
    setTimeout(() => { setLoading(false); setScreen('verify-email'); }, 1200);
  };
  const ErrMsg = ({ msg }) => msg ? <div style={{fontSize:11.5, color:'#DC2626', marginTop:4, fontWeight:500, fontFamily:'Plus Jakarta Sans,sans-serif'}}>⚠ {msg}</div> : null;
  const errStyle = hasErr => hasErr ? { border:'1.5px solid #DC2626', background:'#FEF2F2', boxShadow:'0 0 0 3px rgba(220,38,38,0.10)' } : {};
  return (
    <AuthCard title={tFn('regTitle')} subtitle={tFn('regSub')}>
      <Field label={tFn('regNama')} value={form.name} onChange={set('name')} placeholder={tFn('regNamaP')} error={errors.name}/>
      <div style={{marginBottom:18}}>
        <label style={{display:'block', fontSize:13, fontWeight:600, color: errors.email ? '#DC2626' : C.text, marginBottom:7, fontFamily:'Plus Jakarta Sans,sans-serif'}}>{tFn('regEmail')}</label>
        <input type="email" value={form.email} onChange={e=>set('email')(e.target.value)} placeholder={tFn('regEmailP')}
          style={{width:'100%', padding:'11px 14px', borderRadius:10, fontSize:13.5, outline:'none', color:C.text, transition:'border-color .18s, box-shadow .18s', ...errStyle(errors.email), border: errors.email ? '1.5px solid #DC2626' : `1.5px solid ${C.border}`, background: errors.email ? '#FEF2F2' : '#FAFBFF'}}
          onFocus={e=>{if(!errors.email){e.target.style.borderColor=C.blue; e.target.style.boxShadow=`0 0 0 3px ${C.blue}1A`; e.target.style.background='#fff'}}}
          onBlur={e=>{if(!errors.email){e.target.style.borderColor=C.border; e.target.style.boxShadow='none'; e.target.style.background='#FAFBFF'}}}
        />
        <ErrMsg msg={errors.email}/>
      </div>
      <Field label={tFn('regTelp')} value={form.phone} onChange={v=>set('phone')(v.replace(/\D/g,''))} placeholder={tFn('regTelpP')} inputMode="numeric" error={errors.phone}/>
      <div style={{marginBottom:18}}>
        <label style={{display:'block', fontSize:13, fontWeight:600, color: errors.password ? '#DC2626' : C.text, marginBottom:7, fontFamily:'Plus Jakarta Sans,sans-serif'}}>{tFn('regPass')}</label>
        <input type="password" value={form.password} onChange={e=>set('password')(e.target.value)} placeholder={tFn('regPassP')}
          style={{width:'100%', padding:'11px 14px', borderRadius:10, fontSize:13.5, outline:'none', color:C.text, transition:'border-color .18s, box-shadow .18s', border: errors.password ? '1.5px solid #DC2626' : `1.5px solid ${C.border}`, background: errors.password ? '#FEF2F2' : '#FAFBFF'}}
          onFocus={e=>{if(!errors.password){e.target.style.borderColor=C.blue; e.target.style.boxShadow=`0 0 0 3px ${C.blue}1A`; e.target.style.background='#fff'}}}
          onBlur={e=>{if(!errors.password){e.target.style.borderColor=C.border; e.target.style.boxShadow='none'; e.target.style.background='#FAFBFF'}}}

function VerifyEmail({ setScreen, t }) {
  const tFn = t || tG;
  const [digits, setDigits] = useState(['','','','','','']);
  const [codeError, setCodeError] = useState('');
  const [sent, setSent] = useState(false);
  const [loading, setLoading] = useState(false);
  const inputRefs = [useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];

  const handleDigit = (i, val) => {
    // reject any non-numeric character
    if (val && !/^\d$/.test(val)) {
      setCodeError(tFn ? (tFn('verCodeNumOnly') || 'Kode hanya boleh berisi angka') : 'Kode hanya boleh berisi angka');
      return;
    }
    setCodeError('');
    const next = [...digits];
    next[i] = val;
    setDigits(next);
    if (val && i < 5) inputRefs[i+1].current.focus();
  };

  const handleKeyDown = (i, e) => {
    if (e.key === 'Backspace' && !digits[i] && i > 0) {
      inputRefs[i-1].current.focus();
    }
  };

  const handlePaste = (e) => {
    e.preventDefault();
    const pasted = e.clipboardData.getData('text').trim();
    if (!/^\d+$/.test(pasted)) {
      setCodeError(tFn ? (tFn('verCodeNumOnly') || 'Kode hanya boleh berisi angka') : 'Kode hanya boleh berisi angka');
      return;
    }
    setCodeError('');
    const chars = pasted.slice(0,6).split('');
    const next = ['','','','','',''];
    chars.forEach((c,idx) => { next[idx] = c; });
    setDigits(next);
    const focusIdx = Math.min(chars.length, 5);
    inputRefs[focusIdx].current.focus();
  };

  const code = digits.join('');
  const isComplete = code.length === 6;

  return (
    <AuthCard title={tFn('verTitle')} subtitle={tFn('verSub')}>
      <div style={{
        background:`${C.blue}0D`, border:`1.5px solid ${C.blue}28`,
        borderRadius:12, padding:'14px 16px', marginBottom:22, fontSize:13, color:C.navy,
        lineHeight:1.6
      }}>
        <strong style={{color:C.blue}}>{tFn('verHintBold')}</strong>{tFn('verHintTail')}
      </div>

      {/* OTP digit boxes */}
      <div style={{marginBottom: codeError ? 8 : 22}}>
        <label style={{display:'block', fontSize:13, fontWeight:600, color: codeError ? '#DC2626' : C.text, marginBottom:12, fontFamily:'Plus Jakarta Sans,sans-serif'}}>
          {tFn('verCodeLabel')}
        </label>
        <div style={{display:'flex', gap:10, justifyContent:'center'}}>
          {digits.map((d, i) => (
            <input
              key={i}
              ref={inputRefs[i]}
              type="text"
              inputMode="numeric"
              maxLength={1}
              value={d}
              onChange={e => handleDigit(i, e.target.value.slice(-1))}
              onKeyDown={e => handleKeyDown(i, e)}
              onPaste={i === 0 ? handlePaste : undefined}
              style={{
                width:46, height:54, textAlign:'center',
                fontSize:22, fontWeight:700, letterSpacing:0,
                borderRadius:12,
                border: codeError ? '2px solid #DC2626' : d ? `2px solid ${C.blue}` : `1.5px solid ${C.border}`,
                background: codeError ? '#FEF2F2' : d ? `${C.blue}0D` : '#FAFBFF',
                color: codeError ? '#DC2626' : C.navy,
                outline:'none',
                boxShadow: codeError ? '0 0 0 3px rgba(220,38,38,0.10)' : d ? `0 0 0 3px ${C.blue}1A` : 'none',
                transition:'border-color .18s, box-shadow .18s, background .18s',
                fontFamily:'Plus Jakarta Sans,sans-serif',
                caretColor: C.blue,
              }}
              onFocus={e => {
                if (!codeError) {
                  e.target.style.borderColor = C.blue;
                  e.target.style.boxShadow = `0 0 0 3px ${C.blue}1A`;
                  e.target.style.background = '#fff';
                }
              }}
              onBlur={e => {
                if (!codeError && !d) {
                  e.target.style.borderColor = C.border;
                  e.target.style.boxShadow = 'none';
                  e.target.style.background = '#FAFBFF';
                }
              }}
            />
          ))}
        </div>
        {codeError && (
          <div style={{fontSize:12, color:'#DC2626', marginTop:10, fontWeight:600, textAlign:'center', fontFamily:'Plus Jakarta Sans,sans-serif', display:'flex', alignItems:'center', justifyContent:'center', gap:5}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {codeError}
          </div>
        )}
      </div>

      <button
        onClick={() => {
          if (!isComplete || !!codeError || loading) return;
          setLoading(true);
          setTimeout(() => { setLoading(false); setScreen('login'); }, 2000);
        }}
        disabled={!isComplete || !!codeError || loading}
        style={{
          width:'100%', background: isComplete && !codeError ? C.gradBlue : '#E2E8F0',
          border:'none', color: isComplete && !codeError ? '#fff' : '#94A3B8',
          padding:'13px', borderRadius:12, fontSize:14, fontWeight:700,
          fontFamily:'Plus Jakarta Sans,sans-serif',
          boxShadow: isComplete && !codeError ? `0 4px 18px ${C.blue}44` : 'none',
          cursor: isComplete && !codeError && !loading ? 'pointer' : 'not-allowed',
          transition:'all .2s', display:'flex', alignItems:'center', justifyContent:'center', gap:8
        }}
      >
        {loading ? (
          <>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"
              style={{animation:'spin 0.8s linear infinite'}}>
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
            Memverifikasi...
          </>
        ) : tFn('verBtn')}
      </button>

      <div style={{textAlign:'center', marginTop:16, fontSize:13, color:C.muted}}>
        {tFn('verNoEmail')}{' '}
        <span onClick={() => setSent(true)} style={{color:C.blue, cursor:'pointer', fontWeight:500}}>
          {sent ? tFn('verSent') : tFn('verResend')}
        </span>
      </div>
    </AuthCard>
  );
}

function Login({ setScreen, setUser, t }) {
  const tFn = t || tG;

  const [errors, setErrors] = useState({});
  const isValidEmail = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

    const e = {};
    if (!email.trim()) e.email = 'Wajib diisi';
    else if (!isValidEmail(email)) e.email = 'Format email tidak valid';
    if (!pass) e.pass = 'Wajib diisi';
    setErrors(e);
    return Object.keys(e).length === 0;

    user:    <><path strokeLinecap="round" strokeLinejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/><path strokeLinecap="round" strokeLinejoin="round" d="M4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></>,

  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.75" style={{flexShrink:0}}>

};

// ─── STUDENT DASHBOARD ─────────────────────────────────────────────
function Dashboard({ setScreen, appStatus, setAppStatus, t }) {
  const tFn = t || tG;
  const isMobile = useWindowWidth() <= 768;

  // Popup states
  const [refreshPopup, setRefreshPopup] = useState(null); // null | 'loading' | 'done-verified' | 'done-accepted'
  const [showCongrats, setShowCongrats] = useState(false);
  const [progress, setProgress] = useState(0);

  // Auto-trigger refresh popup after 3.5s when SUBMITTED or VERIFIED
  useEffect(() => {
    if (appStatus !== 'SUBMITTED' && appStatus !== 'VERIFIED') return;
    const delay = setTimeout(() => {
      setRefreshPopup('loading');
      setProgress(0);
    }, 3500);
    return () => clearTimeout(delay);
  }, [appStatus]);

  // Animate progress bar then flip status
  useEffect(() => {
    if (refreshPopup !== 'loading') return;
    setProgress(0);
    const ticks = [
      setTimeout(() => setProgress(30),  200),
      setTimeout(() => setProgress(60),  700),
      setTimeout(() => setProgress(85),  1300),
      setTimeout(() => setProgress(100), 1900),
      setTimeout(() => {
        if (appStatus === 'SUBMITTED') {
          setAppStatus('VERIFIED');
          setRefreshPopup('done-verified');
        } else if (appStatus === 'VERIFIED') {
          setAppStatus('ACCEPTED');
          setRefreshPopup('done-accepted');
        }
      }, 2200),
    ];
    return () => ticks.forEach(clearTimeout);
  }, [refreshPopup]);

  // After "done-accepted" popup auto-closes, show congrats
  useEffect(() => {
    if (refreshPopup !== 'done-accepted') return;
    const t = setTimeout(() => {
      setRefreshPopup(null);
      setShowCongrats(true);
    }, 2000);
    return () => clearTimeout(t);
  }, [refreshPopup]);

  const notifications = [
    { msg:tFn('dashN1'), time:tFn('dashN1t'), unread:true },
    { msg:tFn('dashN2'), time:tFn('dashN2t'), unread:false },
  ];
  const steps = [
    { key:'register', label:tFn('dashStep1'), done:true },
    { key:'verify',   label:tFn('dashStep2'), done:true },
    { key:'form',     label:tFn('dashStep3'), done:appStatus !== 'DRAFT', active: appStatus === 'DRAFT' },
    { key:'upload',   label:tFn('dashStep4'), done:['SUBMITTED','VERIFIED','ACCEPTED','REJECTED'].includes(appStatus) },
    { key:'submit',   label:tFn('dashStep5'), done:['SUBMITTED','VERIFIED','ACCEPTED','REJECTED'].includes(appStatus) },
    { key:'result',   label:tFn('dashStep6'), done:['ACCEPTED','REJECTED'].includes(appStatus) },
  ];

  return (
    <div style={{maxWidth:1200, margin:'0 auto', padding: isMobile?'28px 16px':'40px 40px'}}>

      {/* ── REFRESH POPUP ─────────────────────────────────────── */}
      {refreshPopup && (
        <div style={{
          position:'fixed', inset:0, zIndex:500,
          background:'rgba(7,15,36,0.72)', backdropFilter:'blur(6px)',
          display:'flex', alignItems:'center', justifyContent:'center', padding:20
        }}>
          <div style={{
            background:C.white, borderRadius:24, padding: isMobile?'32px 24px':'40px 48px',
            maxWidth:420, width:'100%', textAlign:'center',
            boxShadow:'0 32px 80px rgba(0,0,0,0.35)'
          }}>
            {refreshPopup === 'loading' && (
              <>
                {/* Spinner */}
                <div style={{position:'relative', width:72, height:72, margin:'0 auto 24px'}}>
                  <svg width="72" height="72" viewBox="0 0 72 72" style={{animation:'spin 1s linear infinite',display:'block'}}>
                    <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
                    <circle cx="36" cy="36" r="30" fill="none" stroke={C.border} strokeWidth="5"/>
                    <circle cx="36" cy="36" r="30" fill="none" stroke={C.blue} strokeWidth="5"
                      strokeDasharray="60 130" strokeLinecap="round"/>
                  </svg>
                  <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>🔄</div>
                </div>
                <h3 style={{fontSize:18, fontWeight:800, color:C.navy, fontFamily:'Plus Jakarta Sans,sans-serif', marginBottom:8}}>
                  Memperbarui Status...
                </h3>
                <p style={{fontSize:13.5, color:C.muted, marginBottom:24, lineHeight:1.6}}>
                  Mohon tunggu, sistem sedang menyinkronkan data pendaftaran Anda.
                </p>
                {/* Progress bar */}
                <div style={{background:C.border, borderRadius:100, height:6, overflow:'hidden'}}>
                  <div style={{
                    height:'100%', borderRadius:100,
                    background:`linear-gradient(90deg,${C.blue},${C.teal})`,
                    width:`${progress}%`, transition:'width .4s ease'
                  }}/>
                </div>
                <div style={{fontSize:12, color:C.subtle, marginTop:8}}>{progress}%</div>
              </>
            )}

            {refreshPopup === 'done-verified' && (
              <>
                <div style={{
                  width:72, height:72, borderRadius:'50%', margin:'0 auto 20px',
                  background:`linear-gradient(135deg,${C.orange},#F97316)`,
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontSize:34, boxShadow:`0 8px 24px ${C.orange}55`
                }}>🔍</div>
                <h3 style={{fontSize:20, fontWeight:800, color:C.navy, fontFamily:'Plus Jakarta Sans,sans-serif', marginBottom:8}}>
                  Status Diperbarui!
                </h3>
                <p style={{fontSize:14, color:C.muted, marginBottom:6, lineHeight:1.6}}>
                  Berkas Anda telah <strong style={{color:C.orange}}>diverifikasi</strong> oleh tim admin.
                </p>
                <p style={{fontSize:13, color:C.subtle}}>Menunggu keputusan akhir penerimaan...</p>
                <button onClick={() => setRefreshPopup(null)} style={{
                  marginTop:24, background:C.gradBlue, border:'none', color:'#fff',
                  padding:'11px 32px', borderRadius:12, fontSize:14, fontWeight:700,
                  fontFamily:'Plus Jakarta Sans,sans-serif', cursor:'pointer',
                  boxShadow:`0 4px 16px ${C.blue}44`
                }}>Lihat Dashboard →</button>
              </>
            )}

            {refreshPopup === 'done-accepted' && (
              <>
                <div style={{fontSize:56, marginBottom:16}}>🎉</div>
                <h3 style={{fontSize:20, fontWeight:800, color:C.green, fontFamily:'Plus Jakarta Sans,sans-serif', marginBottom:8}}>
                  Kabar Baik!
                </h3>
                <p style={{fontSize:14, color:C.muted, lineHeight:1.6}}>
                  Status Anda baru saja diperbarui. Memuat hasil penerimaan...
                </p>
                <div style={{background:C.border, borderRadius:100, height:4, overflow:'hidden', marginTop:20}}>
                  <div style={{height:'100%', borderRadius:100, background:`linear-gradient(90deg,${C.green},#34D399)`, width:'100%', transition:'width 1.8s ease'}}/>
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* ── CONGRATS POPUP ────────────────────────────────────── */}
      {showCongrats && (
        <div style={{
          position:'fixed', inset:0, zIndex:500,
          background:'rgba(7,15,36,0.80)', backdropFilter:'blur(8px)',
          display:'flex', alignItems:'center', justifyContent:'center', padding:20
        }}>
          {/* Confetti dots (decorative) */}
          {[...Array(18)].map((_,i) => (
            <div key={i} style={{
              position:'absolute',
              left:`${5 + (i*17%90)}%`,
              top:`${10 + (i*23%70)}%`,
              width: 8 + (i%3)*4,
              height: 8 + (i%3)*4,
              borderRadius: i%2===0 ? '50%' : 3,
              background:['#2563EB','#0EA5E9','#10B981','#F59E0B','#EF4444','#7C3AED'][i%6],
              opacity: 0.5 + (i%3)*0.15,
              animation:`float ${2 + i%3}s ease-in-out infinite`,
              animationDelay:`${(i*0.3)%2}s`
            }}/>
          ))}

          <div style={{
            background:C.white, borderRadius:28, padding: isMobile?'36px 24px':'48px 56px',
            maxWidth:500, width:'100%', textAlign:'center', position:'relative',
            boxShadow:'0 40px 100px rgba(0,0,0,0.4)'
          }}>
            {/* Gold star badge */}
            <div style={{
              width:90, height:90, borderRadius:'50%', margin:'0 auto 24px',
              background:'linear-gradient(135deg,#F59E0B,#FBBF24)',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:44, boxShadow:'0 10px 32px rgba(245,158,11,0.55)'
            }}>🏆</div>

            <div style={{
              display:'inline-block', background:`linear-gradient(135deg,${C.green}18,${C.teal}22)`,
              border:`1px solid ${C.green}44`, borderRadius:100,
              padding:'4px 18px', fontSize:11, fontWeight:700,
              color:C.green, letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:18
            }}>✓ Pendaftaran Diterima</div>

            <h2 style={{
              fontSize: isMobile?22:28, fontWeight:800, color:C.navy,
              fontFamily:'Plus Jakarta Sans,sans-serif', letterSpacing:'-0.02em', lineHeight:1.2, marginBottom:12
            }}>
              Selamat! Anda Diterima di<br/>
              <span style={{
                background:`linear-gradient(135deg,${C.blue},${C.teal})`,
                WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent'
              }}>Yayasan Darul Furqan</span>
            </h2>

            <p style={{fontSize:14.5, color:C.muted, lineHeight:1.75, marginBottom:28}}>
              Alhamdulillah, selamat bergabung bersama keluarga besar Yayasan Darul Furqan Pariaman.
              Silakan cek surat penerimaan resmi Anda dan lakukan daftar ulang sebelum <strong>31 Juli 2026</strong>.
            </p>

            {/* Details row */}
            <div style={{
              background:C.bg, borderRadius:16, padding:'16px 20px', marginBottom:28,
              display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, textAlign:'left'
            }}>
              {[
                { label:'No. Peserta', val:'PPDB-2026-001' },
                { label:'Nama',        val:'Ahmad Fauzi' },
                { label:'Kelas',       val:'Kelas VII (SMP)' },
                { label:'Daftar Ulang',val:'21–31 Juli 2026' },
              ].map((d,i) => (
                <div key={i}>
                  <div style={{fontSize:10, color:C.subtle, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:3}}>{d.label}</div>
                  <div style={{fontSize:13, fontWeight:600, color:C.navy, fontFamily:'Plus Jakarta Sans,sans-serif'}}>{d.val}</div>
                </div>
              ))}
            </div>

            <div style={{display:'flex', gap:12, justifyContent:'center', flexWrap:'wrap'}}>
              <button onClick={() => { setShowCongrats(false); setScreen('result'); }} style={{
                background:`linear-gradient(135deg,${C.green},#34D399)`, border:'none', color:'#fff',
                padding:'13px 28px', borderRadius:14, fontSize:14, fontWeight:700,
                fontFamily:'Plus Jakarta Sans,sans-serif', cursor:'pointer',
                boxShadow:`0 6px 20px ${C.green}55`
              }}>Lihat Surat Penerimaan →</button>
              <button onClick={() => {
                const blob = new Blob([`SURAT PENERIMAAN PESERTA DIDIK BARU\nYayasan Darul Furqan Pariaman\n\nNo. Peserta : PPDB-2026-001\nNama        : Ahmad Fauzi\nKelas       : Kelas VII (SMP)\nDaftar Ulang: 21–31 Juli 2026\n\nAlhamdulillah, anda dinyatakan DITERIMA sebagai peserta didik baru\nYayasan Darul Furqan Pariaman Tahun Ajaran 2026/2027.\n\nSilakan lakukan daftar ulang sebelum 31 Juli 2026.`], {type:'text/plain'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'Surat_Penerimaan_PPDB2026.txt'; a.click();
                URL.revokeObjectURL(url);
              }} style={{
                background:'linear-gradient(135deg,#2563EB,#0EA5E9)', border:'none', color:'#fff',
                padding:'13px 22px', borderRadius:14, fontSize:14, fontWeight:700,
                fontFamily:'Plus Jakarta Sans,sans-serif', cursor:'pointer',
                boxShadow:`0 6px 20px rgba(37,99,235,0.45)`,
                display:'flex', alignItems:'center', gap:7
              }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download PDF
              </button>
              <button onClick={() => setShowCongrats(false)} style={{
                background:'none', border:`1.5px solid ${C.border}`, color:C.muted,
                padding:'13px 22px', borderRadius:14, fontSize:14, fontWeight:600,
                fontFamily:'Plus Jakarta Sans,sans-serif', cursor:'pointer'
              }}>Tutup</button>
            </div>
          </div>
        </div>
      )}

      {/* ── MAIN DASHBOARD CONTENT ────────────────────────────── */}
      <div style={{marginBottom:32}}>
        <h1 style={{fontSize: isMobile?22:28, color:C.navy, fontFamily:'Plus Jakarta Sans,sans-serif', fontWeight:800, letterSpacing:'-0.02em'}}>{tFn('dashTitle')}</h1>
        <p style={{color:C.muted, fontSize:14, marginTop:5, fontWeight:500}}>{tFn('dashSub')}</p>
      </div>

      {/* STATUS CARD */}
      <div style={{
        background: appStatus === 'ACCEPTED' ? C.greenBg :
                    appStatus === 'REJECTED' ? C.redBg :
                    appStatus === 'SUBMITTED' ? C.blueLight :
                    appStatus === 'VERIFIED' ? C.orangeBg : C.white,
        border:`1.5px solid ${
          appStatus === 'ACCEPTED' ? C.green+'44' :
          appStatus === 'REJECTED' ? C.red+'44' :
          appStatus === 'SUBMITTED' ? C.blue+'44' :
          appStatus === 'VERIFIED' ? C.orange+'44' : C.border}`,
        borderRadius:16, padding:'22px 26px', marginBottom:24,
        display:'flex', alignItems:'center', justifyContent:'space-between', gap:12,
        boxShadow:'0 2px 12px rgba(12,31,74,0.06)'
      }} role="alert" aria-live="polite">
        <div>
          <div style={{fontSize:11, color:C.subtle, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:8}}>{tFn('dashStatusLabel')}</div>
          <div style={{display:'flex', alignItems:'center', gap:12, flexWrap:'wrap'}}>
            <Badge status={appStatus}/>
            <span style={{fontSize:14, color:C.text, fontWeight:500}}>
              {appStatus === 'DRAFT'     && tFn('dashDraft')}
              {appStatus === 'SUBMITTED' && tFn('dashSubmitted')}
              {appStatus === 'VERIFIED'  && tFn('dashVerified')}
              {appStatus === 'ACCEPTED'  && tFn('dashAccepted')}
              {appStatus === 'REJECTED'  && tFn('dashRejected')}
            </span>
          </div>
          {/* Countdown hint for SUBMITTED / VERIFIED */}
          {(appStatus === 'SUBMITTED' || appStatus === 'VERIFIED') && (
            <div style={{
              display:'flex', alignItems:'center', gap:6, marginTop:10,
              fontSize:12, color:C.blue, fontWeight:500
            }}>
              <span className="pulse-dot" style={{width:6,height:6,borderRadius:'50%',background:C.blue,boxShadow:`0 0 4px ${C.blue}`,flexShrink:0}}/>
              Sistem sedang memproses — akan diperbarui otomatis...
            </div>
          )}
        </div>
        {appStatus === 'DRAFT' && (
          <button onClick={() => setScreen('form')} style={{
            background:C.gradBlue, border:'none', color:'#fff',
            padding:'10px 20px', borderRadius:10, fontSize:13, fontWeight:700, flexShrink:0,
            fontFamily:'Plus Jakarta Sans,sans-serif', boxShadow:`0 3px 12px ${C.blue}44`
          }}>{tFn('dashContinue')}</button>
        )}
        {appStatus === 'ACCEPTED' && (
          <button onClick={() => setShowCongrats(true)} style={{
            background:`linear-gradient(135deg,${C.green},#34D399)`, border:'none', color:'#fff',
            padding:'10px 20px', borderRadius:10, fontSize:13, fontWeight:700, flexShrink:0,
            fontFamily:'Plus Jakarta Sans,sans-serif', boxShadow:`0 3px 12px ${C.green}44`

        )}

          {steps.map((s,i) => (
            <React.Fragment key={s.key}>

                onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border; e.currentTarget.style.boxShadow='none'}}

                <Icon name={a.icon} size={20} color={a.color}/>

              </button>

          </div>
        </div>

        {/* NOTIFICATIONS */}
        <div style={{background:C.white, borderRadius:12, padding:'24px 28px', border:`1px solid ${C.border}`}}>
          <div style={{fontSize:13, fontWeight:600, color:C.text, marginBottom:16}}>{tFn('dashNotif')}</div>
          {notifications.map((n,i) => (
            <div key={i} style={{
              padding:'12px 0', borderBottom: i<notifications.length-1 ? `1px solid ${C.border}` : 'none'
            }}>
              {n.unread && <div style={{width:6, height:6, borderRadius:'50%', background:C.blue, display:'inline-block', marginRight:6}}/>}
              <div style={{fontSize:12, color:C.text, lineHeight:1.5}}>{n.msg}</div>
              <div style={{fontSize:11, color:C.muted, marginTop:4}}>{n.time}</div>
            </div>
          ))}
        </div>
      </div>

      {/* DEMO CONTROLS */}
      <div style={{marginTop:20, background:C.grayBg, borderRadius:8, padding:'16px 20px', border:`1px dashed ${C.borderDark}`}}>
        <div style={{fontSize:12, fontWeight:600, color:C.muted, marginBottom:8}}>{tFn('dashDemo')}</div>
        <div style={{display:'flex', gap:8, flexWrap:'wrap'}}>
          {['DRAFT','SUBMITTED','VERIFIED','ACCEPTED','REJECTED'].map(s => (
            <button key={s} onClick={() => { setAppStatus(s); setRefreshPopup(null); setShowCongrats(false); }} style={{
              padding:'5px 12px', fontSize:11, borderRadius:5, cursor:'pointer',
              background: appStatus===s ? C.navy : C.white,
              color: appStatus===s ? '#fff' : C.text,
              border: `1px solid ${C.border}`
            }}>{s}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── PPDB FORM ─────────────────────────────────────────────────────
function PPDBForm({ setScreen, setAppStatus, t }) {
  const tFn = t || tG;
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({
    nama:'', nik:'', tempatLahir:'', tglLahir:'', jenisKelamin:'', agama:'', alamat:'',
    namaAyah:'', telpAyah:'', pekerjaanAyah:'', penghasilanAyah:'', alamatAyah:'',
    namaIbu:'', pekerjaanIbu:'', telpIbu:'', penghasilanIbu:'', alamatIbu:'',
    asalSekolah:'', nilaiUN:'', prestasi:''
  });
  const [sameAlamat, setSameAlamat] = useState(false);
  const [errors, setErrors] = useState({});
  const set = k => v => { setForm(f=>({...f,[k]:v})); setErrors(e=>({...e,[k]:false})); };

  const requiredByStep = [
    ['nama','nik','tempatLahir','tglLahir','jenisKelamin','agama','alamat'],
    ['namaAyah','telpAyah','pekerjaanAyah','penghasilanAyah','alamatAyah','namaIbu','telpIbu','pekerjaanIbu','penghasilanIbu','alamatIbu'],
    ['asalSekolah','nilaiUN'],
  ];
  const validate = () => {
    const errs = {};
    requiredByStep[step].forEach(k => { if (!form[k] || !form[k].trim()) errs[k] = true; });
    setErrors(errs);
    return Object.keys(errs).length === 0;
  };

  const pekerjaanOptions = ['PNS/ASN','Wiraswasta','Karyawan Swasta','Petani','Nelayan','TNI/Polri','Guru/Dosen','Dokter/Nakes','Lainnya'];
  const penghasilanOptions = ['< Rp 1.000.000','Rp 1.000.000 – 2.999.999','Rp 3.000.000 – 4.999.999','Rp 5.000.000 – 9.999.999','≥ Rp 10.000.000'];

  const SelectField2 = ({ label, value, onChange, optDefault, options, error }) => (
    <div style={{marginBottom:18}}>
      <label style={{display:'block', fontSize:13, fontWeight:600, color: error ? '#DC2626' : C.text, marginBottom:7, fontFamily:'Plus Jakarta Sans,sans-serif'}}>{label}</label>
      <select value={value} onChange={e=>onChange(e.target.value)} style={{
        width:'100%', padding:'11px 14px', borderRadius:10,
        border: error ? '1.5px solid #DC2626' : `1.5px solid ${C.border}`,
        fontSize:13, outline:'none',
        background: error ? '#FEF2F2' : '#FAFBFF',
        color: value ? C.text : C.subtle,
        boxShadow: error ? '0 0 0 3px rgba(220,38,38,0.10)' : 'none',
        transition:'border-color .18s', fontFamily:'inherit', cursor:'pointer'
      }}
        onFocus={e=>{if(!error){e.target.style.borderColor=C.blue; e.target.style.boxShadow=`0 0 0 3px ${C.blue}1A`}}}
        onBlur={e=>{if(!error){e.target.style.borderColor=C.border; e.target.style.boxShadow='none'}}}
      >
        <option value="">{optDefault}</option>
        {options.map(o=><option key={o}>{o}</option>)}
      </select>
      {error && <div style={{fontSize:11.5, color:'#DC2626', marginTop:4, fontWeight:500, fontFamily:'Plus Jakarta Sans,sans-serif'}}>⚠ Wajib diisi</div>}
    </div>
  );
  const TextareaField2 = ({ label, value, onChange, placeholder, error }) => (
    <div style={{marginBottom:18}}>
      <label style={{display:'block', fontSize:13, fontWeight:600, color: error ? '#DC2626' : C.text, marginBottom:7, fontFamily:'Plus Jakarta Sans,sans-serif'}}>{label}</label>
      <textarea value={value} onChange={e=>onChange(e.target.value)} rows={4} placeholder={placeholder}
        style={{width:'100%', padding:'11px 14px', borderRadius:10,
          border: error ? '1.5px solid #DC2626' : `1.5px solid ${C.border}`,
          fontSize:13, resize:'vertical', outline:'none',
          background: error ? '#FEF2F2' : '#FAFBFF',
          boxShadow: error ? '0 0 0 3px rgba(220,38,38,0.10)' : 'none',
          color:C.text, fontFamily:'inherit', transition:'border-color .18s, box-shadow .18s'}}
        onFocus={e=>{if(!error){e.target.style.borderColor=C.blue; e.target.style.boxShadow=`0 0 0 3px ${C.blue}1A`; e.target.style.background='#fff'}}}
        onBlur={e=>{if(!error){e.target.style.borderColor=C.border; e.target.style.boxShadow='none'; e.target.style.background='#FAFBFF'}}}
      />
      {error && <div style={{fontSize:11.5, color:'#DC2626', marginTop:4, fontWeight:500, fontFamily:'Plus Jakarta Sans,sans-serif'}}>⚠ Wajib diisi</div>}
    </div>
  );

  const steps = [tFn('formStep1'), tFn('formStep2'), tFn('formStep3')];

  const renderStep = () => {
    if (step === 0) return (
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 20px'}}>
        <div style={{gridColumn:'1/-1'}}><Field label={tFn('formNama')} value={form.nama} onChange={set('nama')} placeholder={tFn('formNamaP')} error={errors.nama}/></div>
        <Field label={tFn('formNIK')} value={form.nik} onChange={v=>set('nik')(v.replace(/\D/g,''))} placeholder={tFn('formNIKP')} inputMode="numeric" error={errors.nik}/>
        <Field label={tFn('formTempat')} value={form.tempatLahir} onChange={set('tempatLahir')} placeholder={tFn('formTempatP')} error={errors.tempatLahir}/>
        <Field label={tFn('formTglLahir')} type="date" value={form.tglLahir} onChange={set('tglLahir')} error={errors.tglLahir}/>
        <div>
          <label style={{display:'block', fontSize:13, fontWeight:600, color: errors.jenisKelamin ? '#DC2626' : C.text, marginBottom:6, fontFamily:'Plus Jakarta Sans,sans-serif'}}>{tFn('formGender')}</label>
          <select value={form.jenisKelamin} onChange={e=>set('jenisKelamin')(e.target.value)} style={{
            width:'100%', padding:'10px 12px', borderRadius:7,
            border: errors.jenisKelamin ? '1.5px solid #DC2626' : `1px solid ${C.borderDark}`,
            fontSize:13, background: errors.jenisKelamin ? '#FEF2F2' : ''
          }}>
            <option value="">{tFn('formGenderOpt1')}</option>
            <option>{tFn('formGenderOpt2')}</option>
            <option>{tFn('formGenderOpt3')}</option>
          </select>
          {errors.jenisKelamin && <div style={{fontSize:11.5, color:'#DC2626', marginTop:4, fontWeight:500, fontFamily:'Plus Jakarta Sans,sans-serif'}}>⚠ Wajib diisi</div>}
        </div>
        <div>
          <label style={{display:'block', fontSize:13, fontWeight:600, color: errors.agama ? '#DC2626' : C.text, marginBottom:6, fontFamily:'Plus Jakarta Sans,sans-serif'}}>{tFn('formAgama')}</label>
          <select value={form.agama} onChange={e=>set('agama')(e.target.value)} style={{
            width:'100%', padding:'10px 12px', borderRadius:7,
            border: errors.agama ? '1.5px solid #DC2626' : `1px solid ${C.borderDark}`,
            fontSize:13, background: errors.agama ? '#FEF2F2' : ''
          }}>
            <option value="">{tFn('formAgamaOpt')}</option>
            <option>Islam</option><option>Kristen</option><option>Katolik</option>
            <option>Hindu</option><option>Buddha</option>
          </select>
          {errors.agama && <div style={{fontSize:11.5, color:'#DC2626', marginTop:4, fontWeight:500, fontFamily:'Plus Jakarta Sans,sans-serif'}}>⚠ Wajib diisi</div>}
        </div>
        <div style={{gridColumn:'1/-1', marginTop:6}}>
          <label style={{display:'block', fontSize:13, fontWeight:600, color: errors.alamat ? '#DC2626' : C.text, marginBottom:6, fontFamily:'Plus Jakarta Sans,sans-serif'}}>{tFn('formAlamat')}</label>
          <textarea value={form.alamat} onChange={e=>set('alamat')(e.target.value)} rows={3}
            placeholder={tFn('formAlamatP')}
            style={{width:'100%', padding:'10px 12px', borderRadius:7,
              border: errors.alamat ? '1.5px solid #DC2626' : `1px solid ${C.borderDark}`,
              fontSize:13, resize:'vertical', background: errors.alamat ? '#FEF2F2' : ''}}/>
          {errors.alamat && <div style={{fontSize:11.5, color:'#DC2626', marginTop:4, fontWeight:500, fontFamily:'Plus Jakarta Sans,sans-serif'}}>⚠ Wajib diisi</div>}
        </div>
      </div>
    );
    if (step === 1) return (
      <div>
        {/* ─── DATA AYAH ─── */}
        <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:18}}>
          <div style={{width:4, height:20, borderRadius:4, background:C.gradBlue}}/>
          <span style={{fontSize:14, fontWeight:700, color:C.navy, fontFamily:'Plus Jakarta Sans,sans-serif'}}>{tFn('formAyahSection')}</span>
        </div>
        <div style={{display:'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap:'0 20px'}}>
          <div style={{gridColumn: isMobile ? '1' : '1/-1'}}>
            <Field label={tFn('formAyah')} value={form.namaAyah} onChange={set('namaAyah')} placeholder={tFn('formAyahP')} error={errors.namaAyah}/>
          </div>
          <Field label={tFn('formAyahTelp')} value={form.telpAyah} onChange={v=>set('telpAyah')(v.replace(/\D/g,''))} placeholder={tFn('formAyahTelpP')} inputMode="numeric" error={errors.telpAyah}/>
          <SelectField2 label={tFn('formAyahPekerjaan')} value={form.pekerjaanAyah} onChange={set('pekerjaanAyah')} optDefault={tFn('formAyahPekerjaanOpt')} options={pekerjaanOptions} error={errors.pekerjaanAyah}/>
          <div style={{gridColumn: isMobile ? '1' : '1/-1'}}>
            <SelectField2 label={tFn('formAyahPenghasilan')} value={form.penghasilanAyah} onChange={set('penghasilanAyah')} optDefault={tFn('formAyahPenghasilanOpt')} options={penghasilanOptions} error={errors.penghasilanAyah}/>
          </div>
          <div style={{gridColumn: isMobile ? '1' : '1/-1'}}>
            <TextareaField2 label={tFn('formAyahAlamat')} value={form.alamatAyah} onChange={set('alamatAyah')} placeholder={tFn('formAyahAlamatP')} error={errors.alamatAyah}/>
          </div>
        </div>

        {/* divider */}
        <div style={{height:1, background:C.border, margin:'8px 0 24px'}}/>

        {/* ─── DATA IBU ─── */}
        <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:18}}>
          <div style={{width:4, height:20, borderRadius:4, background:'linear-gradient(135deg,#7C3AED,#EC4899)'}}/>
          <span style={{fontSize:14, fontWeight:700, color:C.navy, fontFamily:'Plus Jakarta Sans,sans-serif'}}>{tFn('formIbuSection')}</span>
        </div>
        <div style={{display:'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap:'0 20px'}}>
          <div style={{gridColumn: isMobile ? '1' : '1/-1'}}>
            <Field label={tFn('formIbu')} value={form.namaIbu} onChange={set('namaIbu')} placeholder={tFn('formIbuP')} error={errors.namaIbu}/>
          </div>
          <Field label={tFn('formIbuTelp')} value={form.telpIbu} onChange={v=>set('telpIbu')(v.replace(/\D/g,''))} placeholder={tFn('formIbuTelpP')} inputMode="numeric" error={errors.telpIbu}/>
          <SelectField2 label={tFn('formIbuPekerjaan')} value={form.pekerjaanIbu} onChange={set('pekerjaanIbu')} optDefault={tFn('formIbuPekerjaanOpt')} options={pekerjaanOptions} error={errors.pekerjaanIbu}/>
          <div style={{gridColumn: isMobile ? '1' : '1/-1'}}>
            <SelectField2 label={tFn('formIbuPenghasilan')} value={form.penghasilanIbu} onChange={set('penghasilanIbu')} optDefault={tFn('formIbuPenghasilanOpt')} options={penghasilanOptions} error={errors.penghasilanIbu}/>
          </div>
          <div style={{gridColumn: isMobile ? '1' : '1/-1'}}>
            <div style={{marginBottom:10, display:'flex', alignItems:'center', gap:8}}>
              <input type="checkbox" id="sameAlamat" checked={sameAlamat} onChange={e=>{
                setSameAlamat(e.target.checked);
                if(e.target.checked) set('alamatIbu')(form.alamatAyah);
                else set('alamatIbu')('');
              }} style={{width:15,height:15,accentColor:C.blue,cursor:'pointer'}}/>
              <label htmlFor="sameAlamat" style={{fontSize:12.5, color:C.muted, cursor:'pointer', fontFamily:'Plus Jakarta Sans,sans-serif'}}>{tFn('formSameAlamat')}</label>
            </div>
            <TextareaField2 label={tFn('formIbuAlamat')} value={form.alamatIbu} onChange={v=>{setSameAlamat(false);set('alamatIbu')(v);}} placeholder={tFn('formIbuAlamatP')} error={errors.alamatIbu}/>
          </div>
        </div>
      </div>
    );
    if (step === 2) return (
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 20px'}}>
        <div style={{gridColumn:'1/-1'}}><Field label={tFn('formAsalSekolah')} value={form.asalSekolah} onChange={set('asalSekolah')} placeholder={tFn('formAsalP')} error={errors.asalSekolah}/></div>
        <Field label={tFn('formNilai')} value={form.nilaiUN} onChange={set('nilaiUN')} placeholder={tFn('formNilaiP')} inputMode="decimal" error={errors.nilaiUN}/>
        <div style={{gridColumn:'1/-1'}}>
          <label style={{display:'block', fontSize:13, fontWeight:500, marginBottom:6}}>{tFn('formPrestasi')}</label>
          <textarea value={form.prestasi} onChange={e=>set('prestasi')(e.target.value)} rows={3}
            placeholder={tFn('formPrestasiP')}
            style={{width:'100%', padding:'10px 12px', borderRadius:7, border:`1px solid ${C.borderDark}`, fontSize:13, resize:'vertical'}}/>
        </div>
      </div>
    );
  };

  const isMobile = useWindowWidth() <= 768;
  return (
    <div style={{maxWidth:860, margin:'0 auto', padding: isMobile?'24px 16px':'40px'}}>
      <div style={{marginBottom:24, display:'flex', alignItems:'center', gap:12}}>
        <button onClick={() => setScreen('dashboard')} style={{background:'none', border:`1px solid ${C.border}`, color:C.muted, fontSize:13, cursor:'pointer', padding:'6px 14px', borderRadius:8, fontFamily:'Plus Jakarta Sans,sans-serif', fontWeight:600}}>{tFn('formBack')}</button>
        <h1 style={{fontSize: isMobile?20:24, color:C.navy, fontFamily:'Plus Jakarta Sans,sans-serif', fontWeight:800, letterSpacing:'-0.02em'}}>{tFn('formTitle')}</h1>
      </div>

      {/* STEP TABS */}
      <div style={{display:'flex', background:C.white, borderRadius:14, border:`1px solid ${C.border}`, marginBottom:24, overflow:'hidden', boxShadow:'0 2px 8px rgba(12,31,74,0.05)'}}>
        {steps.map((s,i) => (
          <div key={i} onClick={() => i < step && setStep(i)} style={{
            flex:1, padding:'14px', textAlign:'center', fontSize:13, fontWeight: i===step ? 700 : 500,
            color: i===step ? C.blue : i<step ? C.green : C.subtle,
            background: i===step ? `${C.blue}0D` : 'transparent',
            borderBottom: i===step ? `2.5px solid ${C.blue}` : '2.5px solid transparent',
            cursor: i < step ? 'pointer' : 'default',
            fontFamily:'Plus Jakarta Sans,sans-serif'
          }}>
            {i < step ? '✓ ' : `${i+1}. `}{s}
          </div>
        ))}
      </div>

      <div style={{background:C.white, borderRadius:16, padding: isMobile?'20px':'32px', border:`1px solid ${C.border}`, boxShadow:'0 2px 12px rgba(12,31,74,0.05)'}}>
        <h2 style={{fontSize:16, color:C.navy, marginBottom:20, fontFamily:'Plus Jakarta Sans,sans-serif', fontWeight:700}}>{tFn('formSection')} {step+1}: {steps[step]}</h2>
        {Object.values(errors).some(Boolean) && (
          <div style={{
            display:'flex', alignItems:'center', gap:10,
            background:'#FEF2F2', border:'1.5px solid #FECACA', borderRadius:10,
            padding:'11px 16px', marginBottom:20
          }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#DC2626" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span style={{fontSize:13, color:'#DC2626', fontWeight:600, fontFamily:'Plus Jakarta Sans,sans-serif'}}>Harap lengkapi semua data yang wajib diisi sebelum melanjutkan.</span>
          </div>
        )}
        {renderStep()}
        <div style={{display:'flex', justifyContent:'space-between', marginTop:24, paddingTop:20, borderTop:`1px solid ${C.border}`}}>
          <button onClick={() => { if(step > 0){ setErrors({}); setStep(step-1); } }} disabled={step===0} style={{
            background:'none', border:`1.5px solid ${C.border}`, color:C.muted,
            padding:'10px 22px', borderRadius:10, fontSize:13, fontWeight:600,
            fontFamily:'Plus Jakarta Sans,sans-serif', opacity: step===0 ? 0.4 : 1, cursor: step===0 ? 'default' : 'pointer'
          }}>{tFn('formPrev')}</button>
          {step < steps.length-1 ? (
            <button onClick={() => { if(validate()) { setErrors({}); setStep(step+1); } }} style={{
              background:C.gradBlue, border:'none', color:'#fff',
              padding:'10px 26px', borderRadius:10, fontSize:13, fontWeight:700,
              fontFamily:'Plus Jakarta Sans,sans-serif', boxShadow:`0 3px 12px ${C.blue}44`, cursor:'pointer'
            }}>{tFn('formNext')}</button>
          ) : (
            <button onClick={() => { if(validate()) { setAppStatus('DRAFT'); setScreen('upload'); } }} style={{
              background:C.gradBlue, border:'none', color:'#fff',
              padding:'10px 26px', borderRadius:10, fontSize:13, fontWeight:700,
              fontFamily:'Plus Jakarta Sans,sans-serif', boxShadow:`0 3px 12px ${C.blue}44`, cursor:'pointer'
            }}>{tFn('formSaveUpload')}</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── UPLOAD DOKUMEN ─────────────────────────────────────────────────
function Upload({ setScreen, t }) {
  const tFn = t || tG;
  const docs = [
    { key:'kk', label:tFn('uploadKK'), desc:tFn('uploadKKdesc'), req:true },
    { key:'akta', label:tFn('uploadAkta'), desc:tFn('uploadAktadesc'), req:true },
    { key:'rapor', label:tFn('uploadRapor'), desc:tFn('uploadRapordesc'), req:true },
    { key:'foto', label:tFn('uploadFoto'), desc:tFn('uploadFotodesc'), req:true },
    { key:'ijazah', label:tFn('uploadIjazah'), desc:tFn('uploadIjazahreqdesc'), req:true },
    { key:'prestasi', label:tFn('uploadSertif'), desc:tFn('uploadSertifdesc'), req:false },
  ];
  const [uploaded, setUploaded] = useState({});
  const toggle = key => setUploaded(u => u[key] ? (({[key]:_,...r})=>r)(u) : {...u, [key]:'uploaded'});
  const required = docs.filter(d=>d.req);
  const reqDone = required.every(d => uploaded[d.key]);

  return (
    <div style={{maxWidth:780, margin:'0 auto', padding:'40px'}}>
      <div style={{marginBottom:24, display:'flex', alignItems:'center', gap:12}}>
        <button onClick={() => setScreen('form')} style={{background:'none', border:'none', color:C.muted, fontSize:13, cursor:'pointer'}}>{tFn('uploadBack')}</button>
        <h1 style={{fontSize:22, color:C.navy}}>{tFn('uploadTitle')}</h1>
      </div>
      <div style={{background:C.white, borderRadius:12, border:`1px solid ${C.border}`, overflow:'hidden'}}>
        <div style={{padding:'20px 28px', borderBottom:`1px solid ${C.border}`, background:C.bg}}>
          <div style={{fontSize:13, color:C.muted}}>
            {Object.keys(uploaded).length} {tFn('uploadOf')} {docs.length} {tFn('uploadDocs')} ·{' '}
            <span style={{color: reqDone ? C.green : C.orange}}>
              {reqDone ? tFn('uploadAllDone') : `${required.filter(d=>!uploaded[d.key]).length} ${tFn('uploadMissing')}`}
            </span>
          </div>
        </div>
        {docs.map((d,i) => (
          <div key={d.key} style={{
            padding:'18px 28px', borderBottom: i<docs.length-1 ? `1px solid ${C.border}` : 'none',
            display:'flex', alignItems:'center', justifyContent:'space-between',
            background: uploaded[d.key] ? C.greenBg : 'transparent'
          }}>
            <div style={{flex:1}}>
              <div style={{display:'flex', alignItems:'center', gap:8}}>
                <span style={{fontSize:13, fontWeight:600, color:C.text}}>{d.label}</span>
                {d.req && <span style={{fontSize:10, background:C.redBg, color:C.red, padding:'1px 6px', borderRadius:4, fontWeight:600}}>{tFn('uploadRequired')}</span>}
                {uploaded[d.key] && <span style={{fontSize:11, color:C.green, fontWeight:600}}>{tFn('uploadDone')}</span>}
              </div>
              <div style={{fontSize:12, color:C.muted, marginTop:2}}>{d.desc}</div>
              {uploaded[d.key] && <div style={{fontSize:11, color:C.muted, marginTop:2}}>dokumen_{d.key}.pdf · 1.2 MB</div>}
            </div>
            <button onClick={() => toggle(d.key)} style={{
              background: uploaded[d.key] ? C.redBg : C.navy,
              border: uploaded[d.key] ? `1px solid ${C.red}33` : 'none',
              color: uploaded[d.key] ? C.red : '#fff',
              padding:'8px 16px', borderRadius:6, fontSize:12, fontWeight:500
            }}>
              {uploaded[d.key] ? tFn('uploadDelete') : tFn('uploadAdd')}
            </button>
          </div>
        ))}
      </div>
      <div style={{display:'flex', justifyContent:'flex-end', marginTop:20, gap:12}}>
        <button onClick={() => setScreen('dashboard')} style={{
          background:'none', border:`1px solid ${C.border}`, color:C.text,
          padding:'10px 20px', borderRadius:7, fontSize:13
        }}>{tFn('uploadSaveDraft')}</button>
        <button onClick={() => setScreen('submit-confirm')} disabled={!reqDone} style={{
          background: reqDone ? C.blue : C.muted,
          border:'none', color:'#fff', padding:'10px 24px', borderRadius:7, fontSize:13, fontWeight:600

// ─── SUBMIT CONFIRM ─────────────────────────────────────────────────
function SubmitConfirm({ setScreen, setAppStatus, t }) {
  const tFn = t || tG;

          [tFn('submitK2'), '1304xxxxxxxx0001'],
          [tFn('submitK3'), tFn('submitV3')],
          [tFn('submitK4'), tFn('submitV4')],
          [tFn('submitK5'), tFn('submitV5')],
