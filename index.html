// ─── BADGE ────────────────────────────────────────────────────────
const statusColors = {
  DRAFT:     { bg: C.grayBg,   color: C.gray },
  SUBMITTED: { bg: C.blueLight, color: C.blue },
  VERIFIED:  { bg: C.orangeBg, color: C.orange },
  ACCEPTED:  { bg: C.greenBg,  color: C.green },
  REJECTED:  { bg: C.redBg,    color: C.red },
};
function Badge({ status }) {
  const s = statusColors[status] || statusColors.DRAFT;
  const label = tG('badge' + status.charAt(0).toUpperCase() + status.slice(1).toLowerCase());
  return (
    <span style={{
      display:'inline-block', padding:'3px 10px', borderRadius:20,
      background: s.bg, color: s.color, fontSize:11, fontWeight:600,
      letterSpacing:'0.02em', border:`1px solid ${s.color}22`
    }}>{label}</span>
  );
}

function Navbar({ screen, setScreen, user, setUser, lang, setLang, darkMode, setDarkMode, t }) {
  const isAuth = !!user;

  const tFn = t || (k => k);
  const [menuOpen, setMenuOpen] = useState(false);
  const isMobile = useWindowWidth() <= 768;

  const scrollTo = (id) => {
    setMenuOpen(false);
    if (screen !== 'landing') { setScreen('landing'); setTimeout(() => { const el = document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth', block:'start'}); }, 150); }
    else { const el = document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth', block:'start'}); }
  };

  const publicNav = [
    { label: tFn('beranda'), action: () => { setScreen('landing'); setMenuOpen(false); window.scrollTo({top:0, behavior:'smooth'}); } },

function ImgPlaceholder({ label, width='100%', height=200, bg='#C7D2E0', stripe='#B8C5D4' }) {
  return (
    <div style={{
      width, height, background: bg, position:'relative', overflow:'hidden',
      display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0
    }}>
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%'}} xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id={`stripe-${label.replace(/\s/g,'')}`} patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(45)">
            <rect width="10" height="20" fill={stripe}/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill={`url(#stripe-${label.replace(/\s/g,'')})`} opacity="0.4"/>
      </svg>
      <div style={{
        position:'relative', textAlign:'center', padding:'8px 16px',
        background:'rgba(255,255,255,0.55)', borderRadius:6,
        fontFamily:'monospace', fontSize:11, color:'#374151', lineHeight:1.5
      }}>{label}</div>
    </div>
  );
}

  const tFn = t || tG;
  const isMobile = useWindowWidth() <= 768;

function AuthCard({ title, subtitle, children }) {
  return (
    <div style={{
      minHeight:'calc(100vh - 64px)', display:'flex', alignItems:'center',
      justifyContent:'center', padding:'40px 20px', background:C.bg
    }}>
      <div style={{
        background:C.white, borderRadius:12, padding:'40px 44px',
        border:`1px solid ${C.border}`, width:'100%', maxWidth:460,
        boxShadow:'0 4px 24px rgba(0,0,0,0.06)'
      }}>
        <div style={{marginBottom:28, textAlign:'center'}}>
          <img src="./assets/logo.png" alt="Darul Furqan" style={{height:48, width:48, objectFit:'contain', margin:'0 auto 16px', display:'block'}}/>
          <h2 style={{fontSize:22, color:C.navy}}>{title}</h2>
          {subtitle && <p style={{fontSize:13, color:C.muted, marginTop:6}}>{subtitle}</p>}

        {children}

}
function Field({ label, type='text', value, onChange, placeholder, hint }) {
  return (
    <div style={{marginBottom:16}}>
      <label style={{display:'block', fontSize:13, fontWeight:500, color:C.text, marginBottom:6}}>{label}</label>
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{
          width:'100%', padding:'10px 12px', borderRadius:7,
          border:`1px solid ${C.borderDark}`, fontSize:13, outline:'none',
          transition:'border-color .15s'
        }}
        onFocus={e=>e.target.style.borderColor=C.blue}
        onBlur={e=>e.target.style.borderColor=C.borderDark}
      />
      {hint && <div style={{fontSize:11, color:C.muted, marginTop:4}}>{hint}</div>}
    </div>
  );
}

  return (
    <AuthCard title={tFn('regTitle')} subtitle={tFn('regSub')}>

      <Field label={tFn('regPass')} type="password" value={form.password} onChange={set('password')} placeholder={tFn('regPassP')}/>
      <Field label={tFn('regConfirm')} type="password" value={form.confirm} onChange={set('confirm')} placeholder={tFn('regConfirmP')}/>

// ─── STUDENT DASHBOARD ─────────────────────────────────────────────
function Dashboard({ setScreen, appStatus, setAppStatus, t }) {
  const tFn = t || tG;
  const notifications = [
    { msg:tFn('dashN1'), time:tFn('dashN1t'), unread:true },
    { msg:tFn('dashN2'), time:tFn('dashN2t'), unread:false },
  ];
  const steps = [
    { key:'register', label:tFn('dashStep1'), done:true },
    { key:'verify', label:tFn('dashStep2'), done:true },
    { key:'form', label:tFn('dashStep3'), done:appStatus !== 'DRAFT' || false, active: appStatus === 'DRAFT' },
    { key:'upload', label:tFn('dashStep4'), done:['SUBMITTED','VERIFIED','ACCEPTED','REJECTED'].includes(appStatus) },
    { key:'submit', label:tFn('dashStep5'), done:['SUBMITTED','VERIFIED','ACCEPTED','REJECTED'].includes(appStatus) },
    { key:'result', label:tFn('dashStep6'), done:['ACCEPTED','REJECTED'].includes(appStatus) },
  ];

  return (
    <div style={{maxWidth:1200, margin:'0 auto', padding:'40px 40px'}}>
      <div style={{marginBottom:32}}>
        <h1 style={{fontSize:26, color:C.navy}}>{tFn('dashTitle')}</h1>
        <p style={{color:C.muted, fontSize:14, marginTop:4}}>{tFn('dashSub')}</p>
      </div>

      {/* STATUS CARD */}
      <div style={{
        background: appStatus === 'ACCEPTED' ? C.greenBg :
                    appStatus === 'REJECTED' ? C.redBg :
                    appStatus === 'SUBMITTED' ? C.blueLight :
                    appStatus === 'VERIFIED' ? C.orangeBg : C.white,
        border:`1px solid ${
          appStatus === 'ACCEPTED' ? C.green+'44' :
          appStatus === 'REJECTED' ? C.red+'44' :
          appStatus === 'SUBMITTED' ? C.blue+'44' :
          appStatus === 'VERIFIED' ? C.orange+'44' : C.border}`,
        borderRadius:12, padding:'24px 28px', marginBottom:24,
        display:'flex', alignItems:'center', justifyContent:'space-between'
      }}>
        <div>
          <div style={{fontSize:12, color:C.muted, fontWeight:500, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:6}}>{tFn('dashStatusLabel')}</div>
          <div style={{display:'flex', alignItems:'center', gap:12}}>
            <Badge status={appStatus}/>
            <span style={{fontSize:14, color:C.text}}>
              {appStatus === 'DRAFT' && tFn('dashDraft')}
              {appStatus === 'SUBMITTED' && tFn('dashSubmitted')}
              {appStatus === 'VERIFIED' && tFn('dashVerified')}
              {appStatus === 'ACCEPTED' && tFn('dashAccepted')}
              {appStatus === 'REJECTED' && tFn('dashRejected')}
            </span>
          </div>
        </div>
        {appStatus === 'DRAFT' && (
          <button onClick={() => setScreen('form')} style={{
            background:C.navy, border:'none', color:'#fff',
            padding:'10px 20px', borderRadius:7, fontSize:13, fontWeight:600, flexShrink:0
          }}>{tFn('dashContinue')}</button>
        )}
        {appStatus === 'ACCEPTED' && (
          <button onClick={() => setScreen('result')} style={{
            background:C.green, border:'none', color:'#fff',
            padding:'10px 20px', borderRadius:7, fontSize:13, fontWeight:600, flexShrink:0
          }}>{tFn('dashViewResult')}</button>
        )}
      </div>

      {/* PROGRESS */}
      <div style={{background:C.white, borderRadius:12, padding:'24px 28px', border:`1px solid ${C.border}`, marginBottom:24}}>
        <div style={{fontSize:13, fontWeight:600, color:C.text, marginBottom:20}}>{tFn('dashProgress')}</div>
        <div style={{display:'flex', alignItems:'center', gap:0}}>
          {steps.map((s,i) => (
            <React.Fragment key={s.key}>
              <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:8, flex:1}}>
                <div style={{
                  width:32, height:32, borderRadius:'50%',
                  background: s.done ? C.green : s.active ? C.blue : C.border,
                  color:'#fff', display:'flex', alignItems:'center', justifyContent:'center',
                  fontSize:14, fontWeight:700
                }}>
                  {s.done ? '✓' : i+1}
                </div>
                <div style={{fontSize:11, textAlign:'center', color: s.done ? C.green : s.active ? C.blue : C.muted, fontWeight: s.active ? 600 : 400}}>
                  {s.label}
                </div>
              </div>
              {i < steps.length-1 && (
                <div style={{height:2, flex:1, background: s.done ? C.green : C.border, marginBottom:22, maxWidth:60}}/>
              )}
            </React.Fragment>
          ))}
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'2fr 1fr', gap:20}}>
        {/* QUICK ACTIONS */}
        <div style={{background:C.white, borderRadius:12, padding:'24px 28px', border:`1px solid ${C.border}`}}>
          <div style={{fontSize:13, fontWeight:600, color:C.text, marginBottom:16}}>{tFn('dashActions')}</div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:10}}>
            {[
              { label:tFn('dashAct1'), icon:'📝', action:'form', color:C.navy },
              { label:tFn('dashAct2'), icon:'📎', action:'upload', color:C.blue },

              <button key={a.action} onClick={() => setScreen(a.action)} style={{
                background:C.bg, border:`1px solid ${C.border}`, borderRadius:8,
                padding:'14px', display:'flex', alignItems:'center', gap:10,
                cursor:'pointer', textAlign:'left'
              }}>
                <span style={{fontSize:20}}>{a.icon}</span>
                <span style={{fontSize:13, fontWeight:500, color:C.text}}>{a.label}</span>
              </button>
            ))}
          </div>
        </div>

        {/* NOTIFICATIONS */}
        <div style={{background:C.white, borderRadius:12, padding:'24px 28px', border:`1px solid ${C.border}`}}>
          <div style={{fontSize:13, fontWeight:600, color:C.text, marginBottom:16}}>{tFn('dashNotif')}</div>
          {notifications.map((n,i) => (
            <div key={i} style={{
              padding:'12px 0', borderBottom: i<notifications.length-1 ? `1px solid ${C.border}` : 'none'
            }}>
              {n.unread && <div style={{width:6, height:6, borderRadius:'50%', background:C.blue, display:'inline-block', marginRight:6}}/>}
              <div style={{fontSize:12, color:C.text, lineHeight:1.5}}>{n.msg}</div>
              <div style={{fontSize:11, color:C.muted, marginTop:4}}>{n.time}</div>
            </div>
          ))}
        </div>
      </div>

      {/* DEMO CONTROLS */}
      <div style={{marginTop:20, background:C.grayBg, borderRadius:8, padding:'16px 20px', border:`1px dashed ${C.borderDark}`}}>
        <div style={{fontSize:12, fontWeight:600, color:C.muted, marginBottom:8}}>{tFn('dashDemo')}</div>
        <div style={{display:'flex', gap:8}}>
          {['DRAFT','SUBMITTED','VERIFIED','ACCEPTED','REJECTED'].map(s => (
            <button key={s} onClick={() => setAppStatus(s)} style={{
              padding:'5px 12px', fontSize:11, borderRadius:5, cursor:'pointer',
              background: appStatus===s ? C.navy : C.white,
              color: appStatus===s ? '#fff' : C.text,
              border: `1px solid ${C.border}`
            }}>{s}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

function Upload({ setScreen, t }) {
  const tFn = t || tG;
  const docs = [
    { key:'kk', label:tFn('uploadKK'), desc:tFn('uploadKKdesc'), req:true },
    { key:'akta', label:tFn('uploadAkta'), desc:tFn('uploadAktadesc'), req:true },

    { key:'ijazah', label:tFn('uploadIjazah'), desc:tFn('uploadIjazahdesc'), req:false },
    { key:'prestasi', label:tFn('uploadSertif'), desc:tFn('uploadSertifdesc'), req:false },
  ];
  const [uploaded, setUploaded] = useState({});
  const toggle = key => setUploaded(u => u[key] ? (({[key]:_,...r})=>r)(u) : {...u, [key]:'uploaded'});
  const required = docs.filter(d=>d.req);
  const reqDone = required.every(d => uploaded[d.key]);

  return (
    <div style={{maxWidth:780, margin:'0 auto', padding:'40px'}}>
      <div style={{marginBottom:24, display:'flex', alignItems:'center', gap:12}}>
        <button onClick={() => setScreen('form')} style={{background:'none', border:'none', color:C.muted, fontSize:13, cursor:'pointer'}}>{tFn('uploadBack')}</button>
        <h1 style={{fontSize:22, color:C.navy}}>{tFn('uploadTitle')}</h1>
      </div>
      <div style={{background:C.white, borderRadius:12, border:`1px solid ${C.border}`, overflow:'hidden'}}>
        <div style={{padding:'20px 28px', borderBottom:`1px solid ${C.border}`, background:C.bg}}>
          <div style={{fontSize:13, color:C.muted}}>
            {Object.keys(uploaded).length} {tFn('uploadOf')} {docs.length} {tFn('uploadDocs')} ·{' '}
            <span style={{color: reqDone ? C.green : C.orange}}>
              {reqDone ? tFn('uploadAllDone') : `${required.filter(d=>!uploaded[d.key]).length} ${tFn('uploadMissing')}`}
            </span>
          </div>
        </div>
        {docs.map((d,i) => (
          <div key={d.key} style={{
            padding:'18px 28px', borderBottom: i<docs.length-1 ? `1px solid ${C.border}` : 'none',
            display:'flex', alignItems:'center', justifyContent:'space-between',
            background: uploaded[d.key] ? C.greenBg : 'transparent'
          }}>
            <div style={{flex:1}}>
              <div style={{display:'flex', alignItems:'center', gap:8}}>
                <span style={{fontSize:13, fontWeight:600, color:C.text}}>{d.label}</span>
                {d.req && <span style={{fontSize:10, background:C.redBg, color:C.red, padding:'1px 6px', borderRadius:4, fontWeight:600}}>{tFn('uploadRequired')}</span>}
                {uploaded[d.key] && <span style={{fontSize:11, color:C.green, fontWeight:600}}>{tFn('uploadDone')}</span>}
              </div>
              <div style={{fontSize:12, color:C.muted, marginTop:2}}>{d.desc}</div>
              {uploaded[d.key] && <div style={{fontSize:11, color:C.muted, marginTop:2}}>dokumen_{d.key}.pdf · 1.2 MB</div>}
            </div>
            <button onClick={() => toggle(d.key)} style={{
              background: uploaded[d.key] ? C.redBg : C.navy,
              border: uploaded[d.key] ? `1px solid ${C.red}33` : 'none',
              color: uploaded[d.key] ? C.red : '#fff',
              padding:'8px 16px', borderRadius:6, fontSize:12, fontWeight:500
            }}>
              {uploaded[d.key] ? tFn('uploadDelete') : tFn('uploadAdd')}
            </button>
          </div>
        ))}
      </div>
      <div style={{display:'flex', justifyContent:'flex-end', marginTop:20, gap:12}}>
        <button onClick={() => setScreen('dashboard')} style={{
          background:'none', border:`1px solid ${C.border}`, color:C.text,
          padding:'10px 20px', borderRadius:7, fontSize:13
        }}>{tFn('uploadSaveDraft')}</button>
        <button onClick={() => setScreen('submit-confirm')} disabled={!reqDone} style={{
          background: reqDone ? C.blue : C.muted,
          border:'none', color:'#fff', padding:'10px 24px', borderRadius:7, fontSize:13, fontWeight:600
        }}>{tFn('uploadSubmit')}</button>
      </div>
    </div>
  );
}

                <td style={{padding:'12px 16px', color:C.muted}}>{a.school}</td>
                <td style={{padding:'12px 16px', color:C.muted}}>{a.date}</td>
                <td style={{padding:'12px 16px', fontWeight:600, color: a.score>=80 ? C.green : a.score>=70 ? C.orange : a.score ? C.red : C.muted}}>
                  {a.score || '—'}
                </td>
                <td style={{padding:'12px 16px'}}><Badge status={a.status}/></td>
                <td style={{padding:'12px 16px'}}>
                  <div style={{display:'flex', gap:6}}>
                    {a.status === 'SUBMITTED' && (
                      <button onClick={() => setVerifyModal(a)} style={{
                        background:C.blue, border:'none', color:'#fff',
                        padding:'5px 12px', borderRadius:5, fontSize:11, fontWeight:500
                      }}>{tFn('adminVerifyBtn')}</button>
                    )}
                    {a.status === 'VERIFIED' && (
                      <>
                        <button onClick={() => doVerify(a.id,'accept')} style={{
                          background:C.green, border:'none', color:'#fff',
                          padding:'5px 10px', borderRadius:5, fontSize:11
                        }}>{tFn('adminAcceptBtn')}</button>
                        <button onClick={() => doVerify(a.id,'reject')} style={{
                          background:C.redBg, border:`1px solid ${C.red}33`, color:C.red,
                          padding:'5px 10px', borderRadius:5, fontSize:11
                        }}>{tFn('adminRejectBtn')}</button>
                      </>
                    )}
                    {['ACCEPTED','REJECTED','DRAFT'].includes(a.status) && (
                      <button style={{
                        background:C.bg, border:`1px solid ${C.border}`, color:C.muted,
                        padding:'5px 12px', borderRadius:5, fontSize:11
                      }}>{tFn('adminDetailBtn')}</button>
                    )}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* VERIFY MODAL */}
      {verifyModal && (
        <div style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,0.4)',
          display:'flex', alignItems:'center', justifyContent:'center', zIndex:200
        }}>
          <div style={{
            background:C.white, borderRadius:14, padding:'36px 40px',
            maxWidth:520, width:'90%', boxShadow:'0 20px 60px rgba(0,0,0,0.2)'
          }}>
            <h2 style={{fontSize:18, color:C.navy, marginBottom:6}}>{tFn('adminModalTitle')}</h2>
            <p style={{fontSize:13, color:C.muted, marginBottom:20}}>{tFn('adminModalSub')} <strong style={{color:C.text}}>{verifyModal.name}</strong></p>
            <div style={{background:C.bg, borderRadius:8, padding:'16px', marginBottom:20}}>
              {[
                [tFn('adminModalDoc1'), tFn('adminModalComplete')],
                [tFn('adminModalDoc2'), tFn('adminModalComplete')],
                [tFn('adminModalDoc3'), tFn('adminModalComplete')],
                [tFn('adminModalDoc4'), tFn('adminModalComplete')],
                [tFn('adminModalDoc5'), tFn('adminModalMissing')],
              ].map(([k,v]) => (
                <div key={k} style={{display:'flex', justifyContent:'space-between', padding:'6px 0', borderBottom:`1px solid ${C.border}`, fontSize:13}}>
                  <span style={{color:C.muted}}>{k}</span>
                  <span style={{color: v.includes('✓') ? C.green : C.orange, fontWeight:500}}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{marginBottom:16}}>
              <label style={{display:'block', fontSize:13, fontWeight:500, marginBottom:6}}>{tFn('adminModalNoteLabel')}</label>
              <textarea rows={3} placeholder={tFn('adminModalNoteP')}
                style={{width:'100%', padding:'10px 12px', borderRadius:7, border:`1px solid ${C.borderDark}`, fontSize:13, resize:'none'}}/>
            </div>
            <div style={{display:'flex', gap:10, justifyContent:'flex-end'}}>
              <button onClick={() => setVerifyModal(null)} style={{
                background:'none', border:`1px solid ${C.border}`, color:C.text,
                padding:'10px 20px', borderRadius:7, fontSize:13
              }}>{tFn('adminModalCancel')}</button>
              <button onClick={() => doVerify(verifyModal.id,'reject')} style={{
                background:C.redBg, border:`1px solid ${C.red}44`, color:C.red,
                padding:'10px 20px', borderRadius:7, fontSize:13, fontWeight:500
              }}>{tFn('adminModalRejectBtn')}</button>
              <button onClick={() => doVerify(verifyModal.id,'verify')} style={{
                background:C.navy, border:'none', color:'#fff',
                padding:'10px 20px', borderRadius:7, fontSize:13, fontWeight:600
              }}>{tFn('adminModalVerifyBtn')}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── APP ROOT ──────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('landing');
  const [user, setUser] = useState(null);
  const [appStatus, setAppStatus] = useState('DRAFT');
  const [lang, setLang] = useState('id');
  const [darkMode, setDarkMode] = useState(false);
  const isMobile = useWindowWidth() <= 768;

  _lang = lang;

  useEffect(() => {
    document.body.classList.toggle('dark-mode', darkMode);
  }, [darkMode]);

  const t = tG;

  const screens = {
    landing: <Landing setScreen={setScreen} lang={lang} t={t}/>,
    'ppdb-info': <PPDBInfo setScreen={setScreen} t={t}/>,
    register: <Register setScreen={setScreen} t={t}/>,
    'verify-email': <VerifyEmail setScreen={setScreen} t={t}/>,
    login: <Login setScreen={setScreen} setUser={setUser} t={t}/>,
    dashboard: <Dashboard setScreen={setScreen} appStatus={appStatus} setAppStatus={setAppStatus} t={t}/>,
    form: <PPDBForm setScreen={setScreen} setAppStatus={setAppStatus} t={t}/>,
    upload: <Upload setScreen={setScreen} t={t}/>,
    'submit-confirm': <SubmitConfirm setScreen={setScreen} setAppStatus={setAppStatus} t={t}/>,
    result: <Result setScreen={setScreen} appStatus={appStatus} t={t}/>,
    'admin-dashboard': <AdminDashboard setScreen={setScreen} t={t}/>,
    'admin-list': <AdminList setScreen={setScreen} t={t}/>,
  };

  return (
    <div style={{minHeight:'100vh', background:C.bg}}>
      <Navbar screen={screen} setScreen={setScreen} user={user} setUser={setUser}
        lang={lang} setLang={setLang} darkMode={darkMode} setDarkMode={setDarkMode} t={t}/>
      <div style={{minHeight:'calc(100vh - 64px)'}}>
        {screens[screen] || screens.landing}
      </div>
      <footer style={{background:'#0F2440', marginTop:0}}>
        <div style={{maxWidth:1200, margin:'0 auto', padding: isMobile ? '40px 20px 24px' : '48px 60px 32px'}}>
          <div style={{display:'grid', gridTemplateColumns: isMobile ? '1fr 1fr' : '2fr 1fr 1fr 1fr', gap: isMobile ? 28 : 40, marginBottom:32}}>
            {/* Brand */}
            <div style={{gridColumn: isMobile ? '1 / -1' : 'auto'}}>
              <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:16}}>
                <img src="./assets/logo.png" alt="Darul Furqan" style={{height:40, width:40, objectFit:'contain', borderRadius:4, background:'#fff', padding:2}}/>
                <div>
                  <div style={{color:'#fff', fontSize:14, fontWeight:600}}>Darul Furqan</div>
                  <div style={{color:'rgba(255,255,255,0.45)', fontSize:11}}>Pariaman</div>
                </div>
              </div>
              <p style={{fontSize:12, color:'rgba(255,255,255,0.5)', lineHeight:1.8, marginBottom:20, maxWidth:280}}>
                Yayasan Darul Furqan Pariaman — Lembaga pendidikan Islam terpadu sejak 1981 yang berkomitmen mencetak generasi unggul berakhlak mulia.
              </p>
              <div style={{display:'flex', gap:10}}>
                {['f', 'ig', 'yt'].map((s,i) => (
                  <div key={i} style={{
                    width:32, height:32, borderRadius:7,
                    background:'rgba(255,255,255,0.08)', border:'1px solid rgba(255,255,255,0.12)',
                    display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize:11, color:'rgba(255,255,255,0.5)', cursor:'pointer', fontWeight:700
                  }}>{s.toUpperCase()}</div>
                ))}
              </div>
            </div>
            {/* Quick Links */}
            <div>
              <div style={{fontSize:12, fontWeight:700, color:'rgba(255,255,255,0.9)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:16}}>{t('fNav')}</div>
              {t('fNavLinks').map(l => (
                <div key={l} style={{fontSize:13, color:'rgba(255,255,255,0.5)', marginBottom:10, cursor:'pointer'}}>{l}</div>
              ))}
            </div>
            {/* PPDB Links */}
            <div>
              <div style={{fontSize:12, fontWeight:700, color:'rgba(255,255,255,0.9)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:16}}>{t('fPPDB')}</div>
              {t('fPPDBLinks').map(l => (
                <div key={l} style={{fontSize:13, color:'rgba(255,255,255,0.5)', marginBottom:10, cursor:'pointer'}}>{l}</div>
              ))}
            </div>
            {/* Contact */}
            <div>
              <div style={{fontSize:12, fontWeight:700, color:'rgba(255,255,255,0.9)', letterSpacing:'0.08em', textTransform:'uppercase', marginBottom:16}}>{t('fKontak')}</div>
              {[
                { icon:'📍', text:t('fContactAddr') },
                { icon:'📞', text:t('fContactTelp') },
                { icon:'✉️', text:t('fContactEmail') },
                { icon:'🕐', text:t('fContactHours') },
              ].map((c,i) => (
                <div key={i} style={{display:'flex', gap:8, marginBottom:10, alignItems:'flex-start'}}>
                  <span style={{fontSize:12, marginTop:1}}>{c.icon}</span>
                  <span style={{fontSize:12, color:'rgba(255,255,255,0.5)', lineHeight:1.5}}>{c.text}</span>
                </div>
              ))}
            </div>
          </div>
          {/* Bottom bar */}
          <div style={{
            borderTop:'1px solid rgba(255,255,255,0.08)',
            paddingTop:20, display:'flex',
            flexDirection: isMobile ? 'column' : 'row',
            justifyContent:'space-between', alignItems: isMobile ? 'flex-start' : 'center',
            gap: isMobile ? 6 : 0
          }}>
            <div style={{fontSize:11, color:'rgba(255,255,255,0.3)'}}>{t('fCopy')}</div>
            <div style={{fontSize:11, color:'rgba(255,255,255,0.3)'}}>{t('fSys')}</div>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
