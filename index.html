// ─── BADGE ────────────────────────────────────────────────────────
const statusColors = {
  DRAFT:     { bg: C.grayBg,   color: C.gray,   label: 'Draft' },
  SUBMITTED: { bg: C.blueLight, color: C.blue,   label: 'Submitted' },
  VERIFIED:  { bg: C.orangeBg, color: C.orange,  label: 'Diverifikasi' },
  ACCEPTED:  { bg: C.greenBg,  color: C.green,   label: 'Diterima' },
  REJECTED:  { bg: C.redBg,    color: C.red,     label: 'Ditolak' },
};
function Badge({ status }) {
  const s = statusColors[status] || statusColors.DRAFT;
  return (
    <span style={{
      display:'inline-block', padding:'3px 10px', borderRadius:20,
      background: s.bg, color: s.color, fontSize:11, fontWeight:600,
      letterSpacing:'0.02em', border:`1px solid ${s.color}22`
    }}>{s.label}</span>
  );
}

// ─── NAVBAR ───────────────────────────────────────────────────────
function Navbar({ screen, setScreen, user, setUser, lang, setLang, darkMode, setDarkMode, t }) {
  const isAuth = !!user;
  const isAdmin = user?.role === 'admin';
  const tFn = t || (k => k);

  const scrollTo = (id) => {
    if (screen !== 'landing') { setScreen('landing'); setTimeout(() => { const el = document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth', block:'start'}); }, 150); }
    else { const el = document.getElementById(id); if(el) el.scrollIntoView({behavior:'smooth', block:'start'}); }
  };

  const publicNav = [
    { label: tFn('beranda'), action: () => { setScreen('landing'); window.scrollTo({top:0, behavior:'smooth'}); } },
    { label: tFn('profil'), action: () => scrollTo('section-profil') },
    { label: tFn('infoGPPDB'), action: () => setScreen('ppdb-info') },
    { label: tFn('berita'), action: () => scrollTo('section-berita') },
    { label: tFn('kegiatan'), action: () => scrollTo('section-kegiatan') },
    { label: tFn('kontak'), action: () => scrollTo('section-kontak') },
  ];

  const LangDarkControls = () => (
    <div style={{display:'flex', alignItems:'center', gap:6}}>
      {/* Language toggle */}
      <div style={{display:'flex', alignItems:'center', background:'rgba(255,255,255,0.08)', borderRadius:6, border:'1px solid rgba(255,255,255,0.15)', overflow:'hidden'}}>
        {['id','en'].map(l => (
          <button key={l} onClick={() => setLang && setLang(l)} style={{
            background: lang===l ? 'rgba(255,255,255,0.2)' : 'transparent',
            border:'none', color: lang===l ? '#fff' : 'rgba(255,255,255,0.5)',
            padding:'5px 10px', fontSize:11, fontWeight: lang===l ? 700 : 400,
            cursor:'pointer', textTransform:'uppercase', letterSpacing:'0.05em'
          }}>{l}</button>
        ))}
      </div>
      {/* Dark mode toggle */}
      <button onClick={() => setDarkMode && setDarkMode(d => !d)}
        title={darkMode ? 'Light Mode' : 'Dark Mode'}
        style={{
          width:32, height:32, borderRadius:6,
          border:'1px solid rgba(255,255,255,0.15)',
          background: darkMode ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.08)',
          cursor:'pointer', fontSize:16,
          display:'flex', alignItems:'center', justifyContent:'center'
        }}>
        {darkMode ? '☀️' : '🌙'}
      </button>
    </div>
  );

  return (
    <nav style={{
      background: C.navy, height:64, display:'flex', alignItems:'center',
      padding:'0 40px', gap:0,
      position:'sticky', top:0, zIndex:100, boxShadow:'0 2px 8px rgba(0,0,0,0.15)'
    }}>
      {/* LOGO */}
      <div style={{display:'flex', alignItems:'center', gap:10, cursor:'pointer', flexShrink:0}}
        onClick={() => { setScreen('landing'); window.scrollTo({top:0,behavior:'smooth'}); }}>
        <img src="./assets/logo.png" alt="Darul Furqan" style={{height:40, width:40, objectFit:'contain', background:'rgba(255,255,255,0.9)', borderRadius:6, padding:2}}/>
        <div>
          <div style={{color:'#fff', fontSize:13, fontWeight:600, lineHeight:1.2}}>Darul Furqan</div>
          <div style={{color:'rgba(255,255,255,0.6)', fontSize:10, lineHeight:1.2}}>Pariaman</div>
        </div>
      </div>

      {!isAuth && (
        <div style={{display:'flex', flex:1, alignItems:'center'}}>
          {/* Nav links left */}
          <div style={{display:'flex', gap:2, marginLeft:24}}>
            {publicNav.map(n => (
              <button key={n.label} onClick={n.action} style={{background:'none',border:'none',color:'rgba(255,255,255,0.75)',fontSize:13,padding:'6px 12px',borderRadius:6,cursor:'pointer'}}
                onMouseEnter={e=>e.target.style.color='#fff'}
                onMouseLeave={e=>e.target.style.color='rgba(255,255,255,0.75)'}
              >{n.label}</button>
            ))}
          </div>
          {/* Right: lang + dark + auth */}
          <div style={{display:'flex', gap:8, alignItems:'center', marginLeft:'auto'}}>
            <LangDarkControls/>
            <div style={{width:1, height:20, background:'rgba(255,255,255,0.2)'}}/>
            <button onClick={() => setScreen('login')} style={{background:'none',border:'1px solid rgba(255,255,255,0.4)',color:'rgba(255,255,255,0.85)',borderRadius:6,padding:'7px 18px',fontSize:13,cursor:'pointer'}}>{tFn('masuk')}</button>
            <button onClick={() => setScreen('register')} style={{background:C.blue,border:'none',color:'#fff',borderRadius:6,padding:'7px 18px',fontSize:13,fontWeight:600,cursor:'pointer'}}>{tFn('daftar')}</button>
          </div>
        </div>
      )}

      {isAuth && (
        <div style={{display:'flex', gap:6, alignItems:'center', marginLeft:'auto'}}>
          {!isAdmin && <button onClick={() => setScreen('dashboard')} style={{background:'none',border:'none',color:'rgba(255,255,255,0.8)',fontSize:13,padding:'4px 12px',borderRadius:6,cursor:'pointer'}}>Dashboard</button>}
          {isAdmin && <>
            <button onClick={() => setScreen('admin-dashboard')} style={{background:'none',border:'none',color:'rgba(255,255,255,0.8)',fontSize:13,padding:'4px 12px',borderRadius:6,cursor:'pointer'}}>Dashboard</button>
            <button onClick={() => setScreen('admin-list')} style={{background:'none',border:'none',color:'rgba(255,255,255,0.8)',fontSize:13,padding:'4px 12px',borderRadius:6,cursor:'pointer'}}>Pendaftar</button>
          </>}
          <LangDarkControls/>
          <div style={{display:'flex',alignItems:'center',gap:10,marginLeft:4,background:'rgba(255,255,255,0.08)',borderRadius:8,padding:'6px 12px'}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:C.blue,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#fff'}}>{user.name[0]}</div>
            <span style={{color:'rgba(255,255,255,0.85)',fontSize:13}}>{user.name}</span>
          </div>
          <button onClick={() => { setUser(null); setScreen('landing'); }} style={{background:'none',border:'1px solid rgba(255,255,255,0.25)',color:'rgba(255,255,255,0.6)',borderRadius:6,padding:'6px 12px',fontSize:12,cursor:'pointer'}}>Keluar</button>
        </div>
      )}
    </nav>
  );
}

// ─── IMAGE PLACEHOLDER ────────────────────────────────────────────
function ImgPlaceholder({ label, width='100%', height=200, bg='#C7D2E0', stripe='#B8C5D4' }) {
  return (
    <div style={{
      width, height, background: bg, position:'relative', overflow:'hidden',
      display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0
    }}>
      <svg style={{position:'absolute',inset:0,width:'100%',height:'100%'}} xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id={`stripe-${label.replace(/\s/g,'')}`} patternUnits="userSpaceOnUse" width="20" height="20" patternTransform="rotate(45)">
            <rect width="10" height="20" fill={stripe}/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill={`url(#stripe-${label.replace(/\s/g,'')})`} opacity="0.4"/>
      </svg>
      <div style={{
        position:'relative', textAlign:'center', padding:'8px 16px',
        background:'rgba(255,255,255,0.55)', borderRadius:6,
        fontFamily:'monospace', fontSize:11, color:'#374151', lineHeight:1.5
      }}>{label}</div>
    </div>
  );
}

function AuthCard({ title, subtitle, children }) {
  return (

      justifyContent:'center', padding:'40px 20px', background:C.bg
    }}>

          <img src="./assets/logo.png" alt="Darul Furqan" style={{height:48, width:48, objectFit:'contain', margin:'0 auto 16px', display:'block'}}/>

          {subtitle && <p style={{fontSize:13, color:C.muted, marginTop:6}}>{subtitle}</p>}
        </div>
        {children}

}
function Field({ label, type='text', value, onChange, placeholder, hint }) {
  return (
    <div style={{marginBottom:16}}>
      <label style={{display:'block', fontSize:13, fontWeight:500, color:C.text, marginBottom:6}}>{label}</label>
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        style={{
          width:'100%', padding:'10px 12px', borderRadius:7,
          border:`1px solid ${C.borderDark}`, fontSize:13, outline:'none',
          transition:'border-color .15s'
        }}
        onFocus={e=>e.target.style.borderColor=C.blue}
        onBlur={e=>e.target.style.borderColor=C.borderDark}
      />
      {hint && <div style={{fontSize:11, color:C.muted, marginTop:4}}>{hint}</div>}
    </div>
  );
}

  return (
    <AuthCard title="Buat Akun Pendaftar" subtitle="Daftarkan diri untuk mengikuti PPDB 2026/2027">

      <Field label="Password" type="password" value={form.password} onChange={set('password')} placeholder="Min. 8 karakter"/>

// ─── PPDB FORM ─────────────────────────────────────────────────────
function PPDBForm({ setScreen, setAppStatus }) {
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({
    nama:'', nik:'', tempatLahir:'', tglLahir:'', jenisKelamin:'', agama:'', alamat:'',
    namaAyah:'', namaIbu:'', pekerjaan:'', telp:'',
    asalSekolah:'', nilaiUN:'', prestasi:''
  });
  const set = k => v => setForm(f=>({...f,[k]:v}));

  const steps = ['Data Diri', 'Data Orang Tua', 'Data Akademik'];

  const renderStep = () => {
    if (step === 0) return (
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 20px'}}>
        <div style={{gridColumn:'1/-1'}}><Field label="Nama Lengkap *" value={form.nama} onChange={set('nama')} placeholder="Sesuai akta kelahiran"/></div>
        <Field label="NIK *" value={form.nik} onChange={set('nik')} placeholder="16 digit NIK"/>
        <Field label="Tempat Lahir *" value={form.tempatLahir} onChange={set('tempatLahir')} placeholder="Kota/kabupaten"/>
        <Field label="Tanggal Lahir *" type="date" value={form.tglLahir} onChange={set('tglLahir')}/>
        <div>
          <label style={{display:'block', fontSize:13, fontWeight:500, marginBottom:6}}>Jenis Kelamin *</label>
          <select value={form.jenisKelamin} onChange={e=>set('jenisKelamin')(e.target.value)} style={{
            width:'100%', padding:'10px 12px', borderRadius:7, border:`1px solid ${C.borderDark}`, fontSize:13
          }}>
            <option value="">— Pilih —</option>
            <option>Laki-laki</option>
            <option>Perempuan</option>
          </select>
        </div>
        <div>
          <label style={{display:'block', fontSize:13, fontWeight:500, marginBottom:6}}>Agama *</label>
          <select value={form.agama} onChange={e=>set('agama')(e.target.value)} style={{
            width:'100%', padding:'10px 12px', borderRadius:7, border:`1px solid ${C.borderDark}`, fontSize:13
          }}>
            <option value="">— Pilih —</option>
            <option>Islam</option><option>Kristen</option><option>Katolik</option>
            <option>Hindu</option><option>Buddha</option>
          </select>
        </div>
        <div style={{gridColumn:'1/-1'}}>
          <label style={{display:'block', fontSize:13, fontWeight:500, marginBottom:6}}>Alamat Lengkap *</label>
          <textarea value={form.alamat} onChange={e=>set('alamat')(e.target.value)} rows={3}
            placeholder="Jalan, nomor, RT/RW, kelurahan, kecamatan, kota"
            style={{width:'100%', padding:'10px 12px', borderRadius:7, border:`1px solid ${C.borderDark}`, fontSize:13, resize:'vertical'}}/>
        </div>
      </div>
    );
    if (step === 1) return (
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 20px'}}>
        <Field label="Nama Ayah *" value={form.namaAyah} onChange={set('namaAyah')} placeholder="Nama lengkap ayah"/>
        <Field label="Nama Ibu *" value={form.namaIbu} onChange={set('namaIbu')} placeholder="Nama lengkap ibu"/>
        <div>
          <label style={{display:'block', fontSize:13, fontWeight:500, marginBottom:6}}>Pekerjaan Orang Tua *</label>
          <select value={form.pekerjaan} onChange={e=>set('pekerjaan')(e.target.value)} style={{
            width:'100%', padding:'10px 12px', borderRadius:7, border:`1px solid ${C.borderDark}`, fontSize:13
          }}>
            <option value="">— Pilih —</option>
            <option>PNS/ASN</option><option>Wiraswasta</option><option>Karyawan Swasta</option>
            <option>Petani</option><option>Nelayan</option><option>TNI/Polri</option><option>Lainnya</option>
          </select>
        </div>
        <Field label="No. Telepon/WA *" value={form.telp} onChange={set('telp')} placeholder="08xxxxxxxxxx"/>
      </div>
    );
    if (step === 2) return (
      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'0 20px'}}>
        <div style={{gridColumn:'1/-1'}}><Field label="Asal Sekolah *" value={form.asalSekolah} onChange={set('asalSekolah')} placeholder="Nama SD/MI asal"/></div>
        <Field label="Nilai Rata-rata Rapor *" value={form.nilaiUN} onChange={set('nilaiUN')} placeholder="Contoh: 85.50"/>
        <div style={{gridColumn:'1/-1'}}>
          <label style={{display:'block', fontSize:13, fontWeight:500, marginBottom:6}}>Prestasi (opsional)</label>
          <textarea value={form.prestasi} onChange={e=>set('prestasi')(e.target.value)} rows={3}
            placeholder="Tuliskan prestasi akademik/non-akademik jika ada"
            style={{width:'100%', padding:'10px 12px', borderRadius:7, border:`1px solid ${C.borderDark}`, fontSize:13, resize:'vertical'}}/>
        </div>
      </div>
    );
  };

  return (
    <div style={{maxWidth:860, margin:'0 auto', padding:'40px'}}>
      <div style={{marginBottom:24, display:'flex', alignItems:'center', gap:12}}>
        <button onClick={() => setScreen('dashboard')} style={{background:'none', border:'none', color:C.muted, fontSize:13, cursor:'pointer'}}>← Kembali</button>
        <h1 style={{fontSize:22, color:C.navy}}>Formulir PPDB 2026/2027</h1>
      </div>

      {/* STEP TABS */}
      <div style={{display:'flex', background:C.white, borderRadius:10, border:`1px solid ${C.border}`, marginBottom:24, overflow:'hidden'}}>
        {steps.map((s,i) => (
          <div key={i} onClick={() => i < step && setStep(i)} style={{
            flex:1, padding:'14px', textAlign:'center', fontSize:13, fontWeight: i===step ? 600 : 400,
            color: i===step ? C.blue : i<step ? C.green : C.muted,
            background: i===step ? C.blueLight : 'transparent',
            borderBottom: i===step ? `2px solid ${C.blue}` : '2px solid transparent',
            cursor: i < step ? 'pointer' : 'default'
          }}>
            {i < step ? '✓ ' : `${i+1}. `}{s}
          </div>
        ))}
      </div>

      <div style={{background:C.white, borderRadius:12, padding:'32px', border:`1px solid ${C.border}`}}>
        <h2 style={{fontSize:16, color:C.navy, marginBottom:20}}>Bagian {step+1}: {steps[step]}</h2>
        {renderStep()}
        <div style={{display:'flex', justifyContent:'space-between', marginTop:24, paddingTop:20, borderTop:`1px solid ${C.border}`}}>
          <button onClick={() => step > 0 && setStep(step-1)} disabled={step===0} style={{
            background:'none', border:`1px solid ${C.border}`, color:C.text,
            padding:'10px 20px', borderRadius:7, fontSize:13, opacity: step===0 ? 0.4 : 1
          }}>← Sebelumnya</button>
          {step < steps.length-1 ? (
            <button onClick={() => setStep(step+1)} style={{
              background:C.navy, border:'none', color:'#fff',
              padding:'10px 24px', borderRadius:7, fontSize:13, fontWeight:600
            }}>Selanjutnya →</button>
          ) : (
            <button onClick={() => { setAppStatus('DRAFT'); setScreen('upload'); }} style={{
              background:C.blue, border:'none', color:'#fff',
              padding:'10px 24px', borderRadius:7, fontSize:13, fontWeight:600
            }}>Simpan & Upload Dokumen →</button>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── UPLOAD DOKUMEN ─────────────────────────────────────────────────
function Upload({ setScreen }) {
  const docs = [
    { key:'kk', label:'Kartu Keluarga', desc:'Scan/foto KK (maks 2MB)', req:true },
    { key:'akta', label:'Akta Kelahiran', desc:'Scan/foto akta (maks 2MB)', req:true },
    { key:'rapor', label:'Raport Semester 1–5', desc:'Semua halaman nilai (PDF/JPG)', req:true },
    { key:'foto', label:'Foto 3×4', desc:'Foto terbaru dengan latar biru/merah (JPG)', req:true },
    { key:'ijazah', label:'Ijazah / SKL', desc:'Jika sudah tersedia (PDF/JPG)', req:false },
    { key:'prestasi', label:'Sertifikat Prestasi', desc:'Jika ada (PDF/JPG)', req:false },
  ];
  const [uploaded, setUploaded] = useState({});
  const toggle = key => setUploaded(u => u[key] ? (({[key]:_,...r})=>r)(u) : {...u, [key]:'uploaded'});
  const required = docs.filter(d=>d.req);
  const reqDone = required.every(d => uploaded[d.key]);

  return (
    <div style={{maxWidth:780, margin:'0 auto', padding:'40px'}}>
      <div style={{marginBottom:24, display:'flex', alignItems:'center', gap:12}}>
        <button onClick={() => setScreen('form')} style={{background:'none', border:'none', color:C.muted, fontSize:13, cursor:'pointer'}}>← Kembali</button>
        <h1 style={{fontSize:22, color:C.navy}}>Upload Dokumen</h1>
      </div>
      <div style={{background:C.white, borderRadius:12, border:`1px solid ${C.border}`, overflow:'hidden'}}>
        <div style={{padding:'20px 28px', borderBottom:`1px solid ${C.border}`, background:C.bg}}>
          <div style={{fontSize:13, color:C.muted}}>
            {Object.keys(uploaded).length} dari {docs.length} dokumen diunggah ·{' '}
            <span style={{color: reqDone ? C.green : C.orange}}>
              {reqDone ? '✓ Semua wajib terpenuhi' : `${required.filter(d=>!uploaded[d.key]).length} dokumen wajib belum diupload`}
            </span>
          </div>
        </div>
        {docs.map((d,i) => (
          <div key={d.key} style={{
            padding:'18px 28px', borderBottom: i<docs.length-1 ? `1px solid ${C.border}` : 'none',
            display:'flex', alignItems:'center', justifyContent:'space-between',
            background: uploaded[d.key] ? C.greenBg : 'transparent'
          }}>
            <div style={{flex:1}}>
              <div style={{display:'flex', alignItems:'center', gap:8}}>
                <span style={{fontSize:13, fontWeight:600, color:C.text}}>{d.label}</span>
                {d.req && <span style={{fontSize:10, background:C.redBg, color:C.red, padding:'1px 6px', borderRadius:4, fontWeight:600}}>Wajib</span>}
                {uploaded[d.key] && <span style={{fontSize:11, color:C.green, fontWeight:600}}>✓ Terupload</span>}
              </div>
              <div style={{fontSize:12, color:C.muted, marginTop:2}}>{d.desc}</div>
              {uploaded[d.key] && <div style={{fontSize:11, color:C.muted, marginTop:2}}>dokumen_{d.key}.pdf · 1.2 MB</div>}
            </div>
            <button onClick={() => toggle(d.key)} style={{
              background: uploaded[d.key] ? C.redBg : C.navy,
              border: uploaded[d.key] ? `1px solid ${C.red}33` : 'none',
              color: uploaded[d.key] ? C.red : '#fff',
              padding:'8px 16px', borderRadius:6, fontSize:12, fontWeight:500
            }}>
              {uploaded[d.key] ? 'Hapus' : '+ Upload'}
            </button>
          </div>
        ))}
      </div>
      <div style={{display:'flex', justifyContent:'flex-end', marginTop:20, gap:12}}>
        <button onClick={() => setScreen('dashboard')} style={{
          background:'none', border:`1px solid ${C.border}`, color:C.text,
          padding:'10px 20px', borderRadius:7, fontSize:13
        }}>Simpan Draft</button>
        <button onClick={() => setScreen('submit-confirm')} disabled={!reqDone} style={{
          background: reqDone ? C.blue : C.muted,
          border:'none', color:'#fff', padding:'10px 24px', borderRadius:7, fontSize:13, fontWeight:600
        }}>Submit Pendaftaran →</button>
      </div>
    </div>
  );
}

      {/* VERIFY MODAL */}
      {verifyModal && (
        <div style={{
          position:'fixed', inset:0, background:'rgba(0,0,0,0.4)',
          display:'flex', alignItems:'center', justifyContent:'center', zIndex:200
        }}>
          <div style={{
            background:C.white, borderRadius:14, padding:'36px 40px',
            maxWidth:520, width:'90%', boxShadow:'0 20px 60px rgba(0,0,0,0.2)'
          }}>
            <h2 style={{fontSize:18, color:C.navy, marginBottom:6}}>Verifikasi Berkas</h2>
            <p style={{fontSize:13, color:C.muted, marginBottom:20}}>Pendaftar: <strong style={{color:C.text}}>{verifyModal.name}</strong></p>
            <div style={{background:C.bg, borderRadius:8, padding:'16px', marginBottom:20}}>
              {[
                ['Kartu Keluarga','✓ Lengkap'],
                ['Akta Kelahiran','✓ Lengkap'],
                ['Raport Semester 1–5','✓ Lengkap'],
                ['Foto 3×4','✓ Lengkap'],
                ['Ijazah / SKL','⚠ Belum ada'],
              ].map(([k,v]) => (
                <div key={k} style={{display:'flex', justifyContent:'space-between', padding:'6px 0', borderBottom:`1px solid ${C.border}`, fontSize:13}}>
                  <span style={{color:C.muted}}>{k}</span>
                  <span style={{color: v.includes('✓') ? C.green : C.orange, fontWeight:500}}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{marginBottom:16}}>
              <label style={{display:'block', fontSize:13, fontWeight:500, marginBottom:6}}>Catatan Admin</label>
              <textarea rows={3} placeholder="Tambahkan catatan jika perlu..."
                style={{width:'100%', padding:'10px 12px', borderRadius:7, border:`1px solid ${C.borderDark}`, fontSize:13, resize:'none'}}/>
            </div>
            <div style={{display:'flex', gap:10, justifyContent:'flex-end'}}>
              <button onClick={() => setVerifyModal(null)} style={{
                background:'none', border:`1px solid ${C.border}`, color:C.text,
                padding:'10px 20px', borderRadius:7, fontSize:13
              }}>Batal</button>
              <button onClick={() => doVerify(verifyModal.id,'reject')} style={{
                background:C.redBg, border:`1px solid ${C.red}44`, color:C.red,
                padding:'10px 20px', borderRadius:7, fontSize:13, fontWeight:500
              }}>Tolak Berkas</button>
              <button onClick={() => doVerify(verifyModal.id,'verify')} style={{
                background:C.navy, border:'none', color:'#fff',
                padding:'10px 20px', borderRadius:7, fontSize:13, fontWeight:600
              }}>Verifikasi ✓</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
